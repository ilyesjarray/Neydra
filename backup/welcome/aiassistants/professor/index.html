<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA AI — Professor Assistant" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/assets/aiassistants/botcards/professorcard.png" type="image/png" />
  <link rel="stylesheet" href="/welcome/aiassistants/aiassistants.css" />
  <title>NEYDRA — Professor</title>
  <style>
    :root { --bot-accent: #ff0000; --bot-accent-glow: rgba(255, 0, 0, 0.5); }
    /* Country selector overlay */
    .country-overlay { position:fixed; inset:0; z-index:300; background:rgba(0,0,0,.97); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; transition:opacity .6s ease; }
    .country-overlay.hidden { opacity:0; pointer-events:none; }
    .country-title { font-family:var(--font-display); font-size:clamp(1rem,2.5vw,1.6rem); color:#ff0000; letter-spacing:4px; text-transform:uppercase; text-shadow:0 0 20px rgba(255,0,0,.5); }
    .country-subtitle { font-family:var(--font-tech); font-size:.85rem; color:#777; letter-spacing:2px; }
    .country-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; max-width:700px; width:90%; max-height:50vh; overflow-y:auto; padding:10px; }
    .country-btn { background:rgba(255,255,255,.03); border:1px solid rgba(255,0,0,.15); color:#ccc; font-family:var(--font-tech); font-size:.85rem; padding:12px 8px; border-radius:10px; cursor:pointer; transition:all .3s ease; text-align:center; letter-spacing:1px; }
    .country-btn:hover { background:rgba(255,0,0,.1); border-color:rgba(255,0,0,.5); color:#fff; box-shadow:0 0 20px rgba(255,0,0,.2); transform:translateY(-2px); }
    .country-btn .flag { font-size:1.4rem; display:block; margin-bottom:4px; }
  </style>
</head>
<body>
  <script>
    window.BOT_CONFIG = {
      id: 2, name: 'Professor', slug: 'professor',
      gender: 'male', accent: '#ff0000',
      voicePitch: 0.9, voiceRate: 0.9,
      voiceLang: 'en-US', ttsVoice: 'daniel',
      cardImg: '/assets/aiassistants/botcards/professorcard.png'
    };
    window.SELECTED_COUNTRY = null;
  </script>
  <canvas id="galaxyCanvas" class="galaxy-canvas"></canvas>
  <button class="back-btn" id="backBtn" onclick="goBack()" title="Back">&#9666;</button>

  <!-- Country Selection Overlay -->
  <div class="country-overlay" id="countryOverlay">
    <div class="country-title">Select Your Country</div>
    <div class="country-subtitle">Professor will adapt to your educational system</div>
    <div class="country-grid" id="countryGrid"></div>
  </div>

  <div class="assistant-container" id="assistantContainer" style="display:none;">
    <div class="chat-panel chat-panel-full" id="chatPanel">
      <div class="chat-header">
        <div class="chat-header-left">
          <img class="chat-header-avatar" id="chatAvatar" src="" alt="Bot" />
          <div>
            <div class="chat-header-name" id="chatBotName"></div>
            <div class="chat-header-status" id="chatBotStatus">Online</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" id="voiceCallBtn" onclick="startVoiceCall()" title="Voice Call">&#9679;</button>
          <span id="countryBadge" style="font-family:var(--font-tech);font-size:.7rem;color:#ff0000;letter-spacing:1px;padding:6px 10px;border:1px solid rgba(255,0,0,.2);border-radius:8px;"></span>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <div class="image-preview-row" id="imagePreviewRow"></div>
        <div class="chat-input-row">
          <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()" title="Attach">&#9673;</button>
          <input type="file" id="imageInput" accept="image/*" multiple hidden />
          <textarea class="chat-input-field" id="chatInput" placeholder="Ask the Professor..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#9654;</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Voice Call Overlay -->
  <div class="voice-call-overlay" id="voiceOverlay">
    <img class="voice-call-avatar" id="voiceAvatar" src="" alt="Avatar" />
    <div class="voice-call-name" id="voiceCallName"></div>
    <div class="voice-call-status" id="voiceStatus">Listening...</div>
    <div class="voice-waveform" id="voiceWaveform">
      <div class="bar" style="animation-delay:0s;height:10px"></div><div class="bar" style="animation-delay:.1s;height:15px"></div><div class="bar" style="animation-delay:.2s;height:20px"></div><div class="bar" style="animation-delay:.3s;height:12px"></div><div class="bar" style="animation-delay:.15s;height:18px"></div><div class="bar" style="animation-delay:.25s;height:8px"></div><div class="bar" style="animation-delay:.35s;height:22px"></div><div class="bar" style="animation-delay:.05s;height:14px"></div>
    </div>
    <button class="voice-end-btn" onclick="endVoiceCall()" title="End">&#10005;</button>
  </div>

  <script>
    var CFG = window.BOT_CONFIG;
    document.getElementById('chatAvatar').src = CFG.cardImg;
    document.getElementById('voiceAvatar').src = CFG.cardImg;
    document.getElementById('chatBotName').textContent = CFG.name;
    document.getElementById('voiceCallName').textContent = CFG.name;

    // ═══ COUNTRY DATA ═══
    var COUNTRIES = [
      {name:'Tunisia',flag:'🇹🇳',code:'TN'},{name:'Algeria',flag:'🇩🇿',code:'DZ'},{name:'Morocco',flag:'🇲🇦',code:'MA'},
      {name:'Egypt',flag:'🇪🇬',code:'EG'},{name:'Saudi Arabia',flag:'🇸🇦',code:'SA'},{name:'UAE',flag:'🇦🇪',code:'AE'},
      {name:'Jordan',flag:'🇯🇴',code:'JO'},{name:'Iraq',flag:'🇮🇶',code:'IQ'},{name:'Lebanon',flag:'🇱🇧',code:'LB'},
      {name:'Libya',flag:'🇱🇾',code:'LY'},{name:'Syria',flag:'🇸🇾',code:'SY'},{name:'Palestine',flag:'🇵🇸',code:'PS'},
      {name:'Qatar',flag:'🇶🇦',code:'QA'},{name:'Kuwait',flag:'🇰🇼',code:'KW'},{name:'Bahrain',flag:'🇧🇭',code:'BH'},
      {name:'Oman',flag:'🇴🇲',code:'OM'},{name:'Yemen',flag:'🇾🇪',code:'YE'},{name:'Sudan',flag:'🇸🇩',code:'SD'},
      {name:'France',flag:'🇫🇷',code:'FR'},{name:'Germany',flag:'🇩🇪',code:'DE'},{name:'UK',flag:'🇬🇧',code:'GB'},
      {name:'USA',flag:'🇺🇸',code:'US'},{name:'Canada',flag:'🇨🇦',code:'CA'},{name:'Turkey',flag:'🇹🇷',code:'TR'},
      {name:'Japan',flag:'🇯🇵',code:'JP'},{name:'South Korea',flag:'🇰🇷',code:'KR'},{name:'China',flag:'🇨🇳',code:'CN'},
      {name:'India',flag:'🇮🇳',code:'IN'},{name:'Brazil',flag:'🇧🇷',code:'BR'},{name:'Spain',flag:'🇪🇸',code:'ES'},
      {name:'Italy',flag:'🇮🇹',code:'IT'},{name:'Russia',flag:'🇷🇺',code:'RU'}
    ];

    var grid = document.getElementById('countryGrid');
    COUNTRIES.forEach(function(c) {
      var btn = document.createElement('button');
      btn.className = 'country-btn';
      btn.innerHTML = '<span class="flag">' + c.flag + '</span>' + c.name;
      btn.onclick = function() { selectCountry(c); };
      grid.appendChild(btn);
    });

    function selectCountry(c) {
      window.SELECTED_COUNTRY = c;
      sessionStorage.setItem('professor_country', JSON.stringify(c));
      document.getElementById('countryBadge').textContent = c.flag + ' ' + c.name;
      document.getElementById('countryOverlay').classList.add('hidden');
      document.getElementById('assistantContainer').style.display = 'flex';
      addBotMessage('Welcome, scholar. I am now calibrated for ' + c.name + '. Ask me anything — I will source answers relevant to your educational system.');
    }

    // Check for saved country
    try {
      var saved = sessionStorage.getItem('professor_country');
      if (saved) { selectCountry(JSON.parse(saved)); }
    } catch(e) {}

    // Galaxy particles — medium density red
    (function () {
      var c = document.getElementById('galaxyCanvas'), x = c.getContext('2d'), W, H;
      function rz() { W = c.width = innerWidth; H = c.height = innerHeight; } rz(); addEventListener('resize', rz);
      var ps = []; for (var i = 0; i < 120; i++)ps.push({ x: Math.random() * 1920, y: Math.random() * 1080, r: .2 + Math.random() * 1.2, vx: (Math.random() - .5) * .15, vy: (Math.random() - .5) * .15, a: Math.random() * .25 + .02, d: 1, t: .002 + Math.random() * .004 });
      function f() { x.clearRect(0, 0, W, H); for (var p of ps) { p.a += p.d * p.t; if (p.a > .4) { p.a = .4; p.d = -1; } if (p.a < .02) { p.a = .02; p.d = 1; } p.x += p.vx; p.y += p.vy; if (p.x < -5) p.x = W + 5; if (p.x > W + 5) p.x = -5; if (p.y < -5) p.y = H + 5; if (p.y > H + 5) p.y = -5; x.beginPath(); x.fillStyle = 'rgba(255,0,0,' + p.a + ')'; x.arc(p.x, p.y, p.r, 0, Math.PI * 2); x.fill(); } requestAnimationFrame(f); } f();
    })();

    // PWA & INIT
    addEventListener('DOMContentLoaded', function () {
      if (!sessionStorage.getItem('professor_country')) { document.getElementById('countryOverlay').style.display = 'flex'; }
      else { setCountry(JSON.parse(sessionStorage.getItem('professor_country'))); }
    });
    
    // ═══ CHAT ENGINE ═══
    var chatHistory = []; var isStreaming = false; var attachedImages = [];
    var isVoiceActive = false;

    function addUserMessage(t, imgs) {
      var d = document.createElement('div'); d.className = 'message user'; d.textContent = t;
      if (imgs && imgs.length > 0) { var iv = document.createElement('div'); iv.className = 'message-images'; imgs.forEach(function (s) { var im = document.createElement('img'); im.src = s; iv.appendChild(im); }); d.appendChild(iv); }
      document.getElementById('chatMessages').appendChild(d); scrollToBottom();
    }
    function addBotMessage(t) { var d = document.createElement('div'); d.className = 'message bot'; d.textContent = t; document.getElementById('chatMessages').appendChild(d); scrollToBottom(); }
    function createStreamingMessage() { var d = document.createElement('div'); d.className = 'message bot'; d.innerHTML = '<span class="msg-text"></span><span class="typing-cursor"></span>'; document.getElementById('chatMessages').appendChild(d); scrollToBottom(); return d; }
    function scrollToBottom() { var m = document.getElementById('chatMessages'); m.scrollTop = m.scrollHeight; }

    async function speakWithOrpheus(text) {
      if (!text) return;
      try {
        var res = await fetch('/api/groq-tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: text.slice(0, 195), voice: CFG.ttsVoice }) });
        if (!res.ok) return;
        var blob = await res.blob(); var url = URL.createObjectURL(blob);
        var audio = new Audio(url); audio.volume = 0.9;
        audio.onended = function () { URL.revokeObjectURL(url); };
        audio.play().catch(function () { });
      } catch (e) { }
    }

    function shouldAutoSpeak(text) { return text && text.trim().split(/\s+/).length <= 10; }

    async function sendMessage() {
      if (isStreaming) return;
      var input = document.getElementById('chatInput'); var text = input.value.trim();
      if (!text && attachedImages.length === 0) return;
      var imgSrcs = attachedImages.slice(); addUserMessage(text, imgSrcs);
      input.value = ''; input.style.height = 'auto'; clearImagePreviews();

      var hasImages = imgSrcs.length > 0; var msgContent;
      if (hasImages) { var parts = []; if (text) parts.push({ type: 'text', text: text }); imgSrcs.forEach(function (s) { parts.push({ type: 'image_url', image_url: { url: s } }); }); msgContent = parts; }
      else { msgContent = text; }
      chatHistory.push({ role: 'user', content: msgContent });
      isStreaming = true; document.getElementById('sendBtn').disabled = true;

      var country = window.SELECTED_COUNTRY ? window.SELECTED_COUNTRY.name : 'Unknown';

      try {
        var response = await fetch('/api/groq-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: chatHistory, botName: CFG.slug, hasImages: hasImages, country: country }) });
        var ct = response.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          var data = await response.json();
          if (data.shy) { addBotMessage(data.content); chatHistory.push({ role: 'assistant', content: data.content }); if (shouldAutoSpeak(data.content)) speakWithOrpheus(data.content); isStreaming = false; document.getElementById('sendBtn').disabled = false; return; }
          if (data.error) { addBotMessage(data.error); isStreaming = false; document.getElementById('sendBtn').disabled = false; return; }
        }
        var reader = response.body.getReader(); var decoder = new TextDecoder(); var msgEl = createStreamingMessage(); var textSpan = msgEl.querySelector('.msg-text'); var fullText = ''; var buffer = '';
        while (true) {
          var result = await reader.read(); if (result.done) break; buffer += decoder.decode(result.value, { stream: true }); var lines = buffer.split('\n'); buffer = lines.pop() || '';
          for (var line of lines) { if (line.startsWith('data: ')) { var d = line.slice(6).trim(); if (d === '[DONE]') continue; try { var j = JSON.parse(d); var delta = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content; if (delta) { fullText += delta; textSpan.textContent = fullText; scrollToBottom(); } } catch (e) { } } }
        }
        var cursor = msgEl.querySelector('.typing-cursor'); if (cursor) cursor.remove();
        if (fullText) { chatHistory.push({ role: 'assistant', content: fullText }); if (shouldAutoSpeak(fullText)) speakWithOrpheus(fullText); }
      } catch (err) { addBotMessage('Connection error.'); }
      isStreaming = false; document.getElementById('sendBtn').disabled = false;
    }

    // Image handling
    document.getElementById('imageInput').addEventListener('change', function (e) { var files = Array.from(e.target.files); var rem = 3 - attachedImages.length; files.slice(0, rem).forEach(function (f) { var r = new FileReader(); r.onload = function (ev) { if (attachedImages.length >= 3) return; attachedImages.push(ev.target.result); renderImagePreviews(); }; r.readAsDataURL(f); }); e.target.value = ''; });
    function renderImagePreviews() { var row = document.getElementById('imagePreviewRow'); row.innerHTML = ''; attachedImages.forEach(function (s, i) { var it = document.createElement('div'); it.className = 'image-preview-item'; it.innerHTML = '<img src="' + s + '" /><button class="image-preview-remove" onclick="removeImage(' + i + ')">&#10005;</button>'; row.appendChild(it); }); }
    window.removeImage = function (i) { attachedImages.splice(i, 1); renderImagePreviews(); };
    function clearImagePreviews() { attachedImages = []; document.getElementById('imagePreviewRow').innerHTML = ''; }

    // Voice call
    var recognition = null;
    function startVoiceCall() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert('Not supported.'); return; }
      isVoiceActive = true; document.getElementById('voiceOverlay').classList.add('active'); document.getElementById('voiceCallBtn').classList.add('active');
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR(); recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'en-US';
      recognition.onresult = async function (e) { var last = e.results[e.results.length - 1]; if (last.isFinal) { var text = last[0].transcript.trim(); if (text) { addUserMessage(text, []); chatHistory.push({ role: 'user', content: text }); var country = window.SELECTED_COUNTRY ? window.SELECTED_COUNTRY.name : 'Unknown'; try { var res = await fetch('/api/groq-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: chatHistory, botName: CFG.slug, hasImages: false, country: country }) }); var reader = res.body.getReader(); var decoder = new TextDecoder(); var ft = ''; var buf = ''; while (true) { var r = await reader.read(); if (r.done) break; buf += decoder.decode(r.value, { stream: true }); var lns = buf.split('\n'); buf = lns.pop() || ''; for (var ln of lns) { if (ln.startsWith('data: ')) { var dd = ln.slice(6).trim(); if (dd === '[DONE]') continue; try { var jj = JSON.parse(dd); var dl = jj.choices && jj.choices[0] && jj.choices[0].delta && jj.choices[0].delta.content; if (dl) ft += dl; } catch (x) { } } } } if (ft) { addBotMessage(ft); chatHistory.push({ role: 'assistant', content: ft }); speakWithOrpheus(ft); } } catch (err) { addBotMessage('Voice error.'); } } } };
      recognition.onerror = function () { }; recognition.onend = function () { if (isVoiceActive) try { recognition.start(); } catch (e) { } }; recognition.start();
    }
    function endVoiceCall() { isVoiceActive = false; if (recognition) { recognition.abort(); recognition = null; } speechSynthesis.cancel(); document.getElementById('voiceOverlay').classList.remove('active'); document.getElementById('voiceCallBtn').classList.remove('active'); }

    function goBack() { speechSynthesis.cancel(); if (recognition) { recognition.abort(); recognition = null; } location.href = '/welcome/aiassistants/choose-your-assistant'; }
    addEventListener('beforeunload', function () { speechSynthesis.cancel(); });
    document.getElementById('chatInput').addEventListener('input', function () { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
  </script>
</body>
</html>

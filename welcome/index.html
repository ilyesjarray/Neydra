<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/security.js"></script>
  <link rel="icon" href="/assets/icon.png" type="image/png" />
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA - Where Imagination Becomes Reality" />
  <meta name="keywords" content="NEYDRA, Imagination, Reality, Web Development, Exchange tnd, Trading" />
  <title> Are You Ready ? </title>
  <link rel="stylesheet" href="/intro.css" />
  <meta name="theme-color" content="#000000" />
  <meta name="theme-color" content="#000000">
  <meta property="og:description" content="NEYDRA - Where Imagination Becomes Reality" />
  <meta name="msapplication-navbutton-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:image" content="https://raw.githubusercontent.com/ilyesjarray/Neydra-assets/main/og-image.jpg" />
  <meta property="og:image:secure_url" content="https://raw.githubusercontent.com/ilyesjarray/Neydra-assets/main/og-image.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://neydra.vercel.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <style>
    body { 
      margin: 0; 
      background: #000; 
      overflow: hidden; 
    }

    .black-screen {
      display: flex;
      justify-content: center;
      align-items: center;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #000;
      z-index: 9999;
      opacity: 1;
      transition: opacity 1s ease-in-out;
    }

    .black-screen.fade-out {
      opacity: 0;
    }

    .ready-scene {
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }

    .ready-scene.fade-in {
      opacity: 1;
    }

    /* --- FIX APPLIED HERE: Strip default button styling & override intro.css --- */
    .ready-continue-btn {
      background: transparent !important;
      border: none !important;
      outline: none !important;
      padding: 0 !important;
      box-shadow: none !important;
      cursor: pointer;
    }

    /* صورة الزر */
    .ready-continue-btn img {
      width: 120px; /* حجم الزر */
      height: 120px;
      filter: brightness(1);
      transition: transform 0.2s ease, filter 0.2s ease;
      transform-origin: center;
      /* Ensure no border on the image itself */
      border: none !important; 
      outline: none !important;
    }

    /* عند التمرير */
    .ready-continue-btn:hover img {
      transform: scale(1.05);
      filter: brightness(1.3);
    }

    /* عند الضغط */
    .ready-continue-btn:active img {
      transform: scale(0.95);
      filter: brightness(0.9);
    }

    /* Premium Glitch Loading Bar CSS */
    .loading-container {
      width: 60%;
      max-width: 600px;
      font-family: 'Courier New', Courier, monospace;
    }

    .loading-text {
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 15px;
      text-transform: uppercase;
      color: #ff0000;
      display: flex;
      justify-content: space-between;
    }

    .loading-bar-wrapper {
      width: 100%;
      height: 4px;
      background-color: #1a1a1a;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #ff0000, #fff);
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.8);
      transition: width 0.1s linear;
    }
    
    .loading-glitch {
      animation: glitchText 4s infinite;
    }

    @keyframes glitchText {
      0%, 95%, 100% { opacity: 1; text-shadow: none; transform: translate(0); }
      96% { opacity: 0.8; text-shadow: 2px 0 red, -2px 0 white; transform: translate(-2px, 1px); }
      97% { opacity: 0.9; text-shadow: -2px 0 red, 2px 0 white; transform: translate(2px, -1px); }
      98% { opacity: 1; text-shadow: none; transform: translate(0); }
    }
  </style>
</head>
<body>
  <div class="black-screen" id="blackScreen">
    <div class="loading-container">
        <div class="loading-text loading-glitch">
            <span id="loading-status">INITIALIZING SYSTEMS...</span>
            <span id="loading-percent">0%</span>
        </div>
        <div class="loading-bar-wrapper">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
    </div>
  </div>

  <div id="readyScene" class="ready-scene">
    <img src="/assets/are-you-ready.gif" alt="Are you ready?" class="ready-img">
    <button id="continueBtn" class="ready-continue-btn">
      <img src="/assets/continue-btn.gif" alt="Continue">
    </button>
  </div>

  <audio id="theme-music2" src="/assets/theme-music2.mp3" loop></audio>
  <audio id="click-sound5" src="/click-sound5.mp3" preload="auto"></audio>

  <script>
    // Blink to fullscreen with multiple verifications for compatibility
    function requestFullscreen() {
      const elem = document.documentElement;
      if (elem.requestFullscreen) {
        elem.requestFullscreen();
      } else if (elem.mozRequestFullScreen) { // Firefox
        elem.mozRequestFullScreen();
      } else if (elem.webkitRequestFullscreen) { // Chrome, Safari, Opera
        elem.webkitRequestFullscreen();
      } else if (elem.msRequestFullscreen) { // IE/Edge
        elem.msRequestFullscreen();
      }
    }

    // Black screen handling & Asset Preloading
    window.addEventListener('load', () => {
      requestFullscreen();

      const blackScreen = document.getElementById('blackScreen');
      const readyScene = document.getElementById('readyScene');
      const loadingBar = document.getElementById('loading-bar');
      const loadingPercent = document.getElementById('loading-percent');
      const loadingStatus = document.getElementById('loading-status');

      // Heavy assets to preload silently
      const heavyAssets = [
        '/assets/are-you-ready.gif',
        '/assets/continue-btn.gif',
        '/assets/theme-music2.mp3',
        '/click-sound5.mp3',
        '/assets/theme-music.mp3',
        '/assets/starting-sound.mp3',
        '/assets/red-earth.gif',
        '/styles.css',
        '/assets/og-image.jpg'
      ];

      let loadedCount = 0;
      const totalAssets = heavyAssets.length;
      let finished = false;
      const startTime = Date.now();
      const MIN_LOADING_TIME = 2500; // Force exact premium feel (2.5 seconds minimum)

      function finishLoading() {
        if (finished) return;
        finished = true;
        loadingBar.style.width = '100%';
        loadingPercent.innerText = '100%';
        loadingStatus.innerText = 'SYSTEM READY.';
        
        setTimeout(() => {
          // Fade out and hide the black screen
          blackScreen.classList.add('fade-out');
          setTimeout(() => {
            blackScreen.style.display = 'none';

            // Fade-in effect for the ready scene
            readyScene.classList.add('fade-in');

            // Play theme music
            const themeMusic = document.getElementById('theme-music2');
            if (themeMusic) themeMusic.play().catch(e => console.log('Audio autoplay prevented'));
          }, 1000); // Match fade-out transition
        }, 500); // 500ms pause at 100% just to show completion
      }

      function updateProgress() {
        if (finished) return;
        loadedCount++;
        const percentComplete = (loadedCount / totalAssets) * 100;
        const displayPercent = Math.floor(percentComplete);
        loadingBar.style.width = percentComplete + '%';
        loadingPercent.innerText = displayPercent + '%';

        if (displayPercent < 30) {
            loadingStatus.textContent = 'ESTABLISHING SECURE CONNECTION...';
        } else if (displayPercent < 60) {
            loadingStatus.textContent = 'DOWNLOADING CORE ASSETS...';
        } else if (displayPercent < 90) {
            loadingStatus.textContent = 'DECRYPTING RESOURCES...';
        } else {
            loadingStatus.textContent = 'FINALIZING DEPLOYMENT...';
        }

        if (loadedCount >= totalAssets) {
          // All loaded, calculate how long we've been loading
          const elapsedTime = Date.now() - startTime;
          const remainingTime = Math.max(0, MIN_LOADING_TIME - elapsedTime);

          setTimeout(() => {
            finishLoading();
          }, remainingTime);
        }
      }

      if (totalAssets === 0) {
        finishLoading();
      } else {
        // Start preloading
        heavyAssets.forEach(url => {
          fetch(url, { mode: 'no-cors' })
            .then(updateProgress)
            .catch(updateProgress); // Continue progress even on failure
        });

        // Fallback: If network hangs, let them in after max 15 seconds
        setTimeout(() => {
          if (!finished) {
            console.warn("Preload timeout reached. Proceeding...");
            finishLoading();
          }
        }, 15000);
      }
    });

    // Fade helpers
    function fadeIn(element, duration) {
      element.style.transition = `opacity ${duration}ms ease-in-out`;
      element.style.opacity = 1;
    }
    function fadeOut(element, duration) {
      element.style.transition = `opacity ${duration}ms ease-in-out`;
      element.style.opacity = 0;
    }

    // Click sound
    function playClickSound() {
      const sound = document.getElementById("click-sound5");
      if (sound) {
        sound.currentTime = 0;
        sound.play();
      }
    }

    // Theme music controls
    function playThemeMusic2() {
      const audio = document.getElementById("theme-music2");
      audio.play();
    }
    function stopThemeMusic2() {
      const audio = document.getElementById("theme-music2");
      audio.pause();
      audio.currentTime = 0;
    }

    // After the black screen fades out, initialize the main scene fade-ins
    window.addEventListener("DOMContentLoaded", () => {
      const readyImg = document.querySelector(".ready-img");
      const continueBtn = document.getElementById("continueBtn");

      // Initial fade state
      readyImg.style.opacity = 0;
      continueBtn.style.opacity = 0;

      // Fade-in the "Are you ready?" image after timing delay
      setTimeout(() => {
        fadeIn(readyImg, 6000);
      }, 6000);

      // Fade-in the continue button slightly later
      setTimeout(() => {
        fadeIn(continueBtn, 3000);
      }, 12000);

      // Add click sound on button interaction
      continueBtn.addEventListener('click', () => {
        playClickSound();
        fadeOut(continueBtn, 3000);
        fadeOut(readyImg, 6000);
        stopThemeMusic2();

        setTimeout(() => {
          window.location.href = "/welcome/account";
        }, 6000); // Redirect after fade-out timing
      });

      // Stop theme music when the page is unloaded
      window.addEventListener("beforeunload", stopThemeMusic2);
    });
  </script>
  <script src="https://elfsightcdn.com/platform.js" async></script>
  <div class="elfsight-app-d014008a-6eb4-4c15-9d7e-1b5ea1a3779f" data-elfsight-app-lazy></div>
  <script src="/js/auth.js"></script>
</body>
</html>

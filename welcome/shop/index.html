<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEYDRA SHOP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --red-primary: #ff0000;
      --red-dark: #8f0000;
      --red-glow: rgba(255, 0, 0, 0.6);
      --bg-void: #000000;
      --bg-card: rgba(31, 0, 0, 0.9);
      --text-white: #ffffff;
      --text-gray: #aaaaaa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    ::-webkit-scrollbar { display: none; width: 0; height: 0; }
    html { scrollbar-width: none; overflow-x: hidden; -ms-overflow-style: none; }
    body { scrollbar-width: none; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background: var(--bg-void);
      color: var(--text-white);
      overflow-x: hidden;
      min-height: 100vh;
      position: relative;
    }

    /* === INTRO SCENE === */
    #intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: var(--bg-void);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      transition: opacity 1s ease-out;
    }
    #intro-overlay.blur-active {
      backdrop-filter: blur(20px);
    }
    #intro-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    #intro-overlay.hidden {
      display: none;
    }

    #intro-guide-container {
      position: absolute;
      bottom: 50px;
      right: 50px;
      display: flex;
      align-items: flex-end;
      gap: 30px;
      opacity: 0;
      transition: opacity 1s ease-in;
    }
    #intro-guide-container.visible {
      opacity: 1;
    }

    #intro-text-container {
      max-width: 400px;
      text-align: right;
    }

    #intro-text {
      font-family: 'Inter', sans-serif;
      font-size: 1.2rem;
      color: var(--text-white);
      line-height: 1.8;
      text-shadow: 0 0 10px var(--red-primary), 0 0 20px var(--red-glow);
    }

    #intro-cursor {
      display: inline-block;
      width: 3px;
      height: 1.2rem;
      background: var(--red-primary);
      margin-left: 2px;
      animation: blinkCursor 0.7s infinite;
      vertical-align: middle;
    }
    #intro-cursor.hidden {
      display: none;
    }

    @keyframes blinkCursor {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    #intro-guide-img {
      max-height: 650px;
      max-width: 550px;
      transition: filter 0.3s ease;
    }

    /* === MAIN CONTENT WRAPPER === */
    #main-content {
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }
    #main-content.visible {
      opacity: 1;
    }

    /* === POPUP OVERLAY === */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 100000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .popup-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .popup-content {
      background: linear-gradient(180deg, rgba(30, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
      border: 2px solid var(--red-primary);
      padding: 30px;
      max-width: 90%;
      max-height: 90vh;
      text-align: center;
      transform: scale(0.8);
      transition: transform 0.3s ease;
      box-shadow: 0 0 50px var(--red-glow);
    }
    .popup-overlay.active .popup-content {
      transform: scale(1);
    }

    .popup-content img {
      max-width: 100%;
      max-height: 300px;
      margin-bottom: 20px;
    }

    .popup-close-btn {
      background: linear-gradient(135deg, var(--red-dark), var(--red-primary));
      border: none;
      color: white;
      padding: 10px 30px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    .popup-close-btn:hover {
      box-shadow: 0 0 30px var(--red-glow);
      transform: scale(1.05);
    }

    /* === RANDOM NOTIFICATION POPUP === */
    .notification-popup {
      position: fixed;
      z-index: 99998;
      background: linear-gradient(135deg, rgba(30, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
      border: 2px solid var(--red-primary);
      padding: 15px 20px;
      max-width: 320px;
      box-shadow: 0 0 30px var(--red-glow);
      transform: translateX(100%);
      opacity: 0;
      transition: all 0.5s ease;
    }
    .notification-popup.show {
      transform: translateX(0);
      opacity: 1;
    }
    .notification-popup.hide {
      transform: translateX(100%);
      opacity: 0;
    }

    .notification-popup.top-right {
      top: 100px;
      right: 20px;
    }
    .notification-popup.top-left {
      top: 100px;
      left: 20px;
    }
    .notification-popup.bottom-right {
      bottom: 100px;
      right: 20px;
    }
    .notification-popup.bottom-left {
      bottom: 100px;
      left: 20px;
    }

    .notification-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.8rem;
      color: var(--red-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .notification-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      color: var(--text-white);
      line-height: 1.5;
    }

    .notification-text span {
      color: var(--red-primary);
      font-weight: 700;
    }

    .notification-close {
      position: absolute;
      top: 5px;
      right: 10px;
      background: none;
      border: none;
      color: var(--text-gray);
      font-size: 1.2rem;
      cursor: pointer;
      transition: color 0.3s ease;
    }
    .notification-close:hover {
      color: var(--red-primary);
    }

    /* === DOWNLOAD SUCCESS POPUP === */
    .download-popup {
      position: fixed;
      z-index: 100001;
      background: linear-gradient(180deg, rgba(30, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.98) 100%);
      border: 2px solid var(--red-primary);
      padding: 30px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 50px var(--red-glow);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
    }
    .download-popup.active {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
      pointer-events: auto;
    }

    .download-icon {
      width: 60px;
      height: 60px;
      background: var(--red-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      animation: pulseIcon 1.5s infinite;
    }
    @keyframes pulseIcon {
      0%, 100% { box-shadow: 0 0 20px var(--red-glow); }
      50% { box-shadow: 0 0 40px var(--red-primary); }
    }

    .download-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.2rem;
      color: var(--text-white);
      margin-bottom: 10px;
    }

    .download-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.9rem;
      color: var(--text-gray);
    }

    /* === ANIMATED BACKGROUND === */
    #galaxy-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* === TYPOGRAPHY === */
    .font-display { font-family: 'Orbitron', sans-serif; }
    .font-title { font-family: 'Bebas Neue', sans-serif; }

    /* === GLOW EFFECTS === */
    .glow-red { text-shadow: 0 0 10px var(--red-primary), 0 0 20px var(--red-primary), 0 0 40px var(--red-glow); }

    /* === HEADER === */
    .main-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: linear-gradient(180deg, rgba(0,0,0,0.98) 0%, rgba(0,0,0,0.85) 100%);
      backdrop-filter: blur(20px);
      border-bottom: 2px solid var(--red-primary);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--red-primary), var(--red-dark));
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulseLogo 2s infinite;
    }
    @keyframes pulseLogo {
      0%, 100% { box-shadow: 0 0 20px var(--red-glow); }
      50% { box-shadow: 0 0 40px var(--red-glow), 0 0 60px var(--red-primary); }
    }

    /* === EXIT BUTTON === */
    .exit-btn {
      background: linear-gradient(135deg, var(--red-dark), var(--red-primary));
      border: none;
      color: white;
      padding: 8px 20px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      cursor: pointer;
      clip-path: polygon(0 0, 100% 0, 85% 100%, 0% 100%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .exit-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: 0.5s;
    }
    .exit-btn:hover::before { left: 100%; }
    .exit-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px var(--red-glow);
    }

    /* === CATEGORY PILLS === */
    .category-nav {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .cat-btn {
      padding: 6px 20px;
      background: transparent;
      border: 1px solid rgba(255, 0, 0, 0.3);
      color: var(--text-gray);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }
    .cat-btn::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--red-primary);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }
    .cat-btn:hover { color: var(--red-primary); border-color: var(--red-primary); }
    .cat-btn:hover::after { transform: scaleX(1); }
    .cat-btn.active {
      background: var(--red-primary);
      color: white;
      border-color: var(--red-primary);
      box-shadow: 0 0 20px var(--red-glow);
    }
    .cat-btn.active::after { transform: scaleX(1); }

    /* === SECTION TITLES === */
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      position: relative;
    }
    .section-icon {
      width: 32px;
      height: 32px;
      background: var(--red-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    }
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      letter-spacing: 3px;
      color: var(--text-white);
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--red-primary), transparent);
    }
    .section-badge {
      background: var(--red-primary);
      color: white;
      padding: 4px 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      clip-path: polygon(10% 0, 100% 0, 100% 100%, 0% 100%);
    }

    /* === MYSTERY SHOP SECTION === */
    .mystery-shop-container {
      position: relative;
      background: linear-gradient(135deg, rgba(139, 0, 0, 0.2) 0%, rgba(0, 0, 0, 0.8) 100%);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 4px;
      margin: 8px 16px;
      overflow: hidden;
    }
    .mystery-shop-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30z' fill='none' stroke='rgba(255,0,0,0.05)' stroke-width='1'/%3E%3C/svg%3E");
      opacity: 0.5;
    }

    .mystery-content {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 16px;
      padding: 16px;
      position: relative;
      z-index: 1;
    }
    @media (min-width: 768px) {
      .mystery-content { grid-template-columns: 300px 1fr; }
    }

    /* Character Mascot - BIGGER */
    .character-mascot {
      position: relative;
      height: 350px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    @media (min-width: 768px) {
      .character-mascot { height: 400px; }
    }
    .character-img {
      max-height: 100%;
      max-width: 100%;
      filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.5));
      transition: transform 0.5s ease;
    }
    .character-img:hover { filter: brightness(1.5) drop-shadow(0 0 50px var(--red-primary)); }

    /* Discount Badge */
    .discount-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: linear-gradient(135deg, var(--red-primary), var(--red-dark));
      padding: 8px 16px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      color: white;
      transform: rotate(-10deg);
      z-index: 10;
      animation: pulseBadge 2s infinite;
      clip-path: polygon(0 0, 100% 0, 90% 100%, 0% 100%);
    }
    @keyframes pulseBadge {
      0%, 100% { box-shadow: 0 0 20px var(--red-glow); transform: rotate(-10deg) scale(1); }
      50% { box-shadow: 0 0 40px var(--red-glow); transform: rotate(-10deg) scale(1.05); }
    }

    /* Mystery Items Grid */
    .mystery-items {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    @media (min-width: 768px) {
      .mystery-items { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    }

    .mystery-item {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 0, 0, 0.2);
      padding: 8px;
      position: relative;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .mystery-item:hover {
      border-color: var(--red-primary);
      background: rgba(255, 0, 0, 0.1);
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgb(255, 0, 0);
    }
    .mystery-item-img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      filter: drop-shadow(0 0 5px rgba(255, 0, 0, 0.3));
    }
    .mystery-item-name {
      font-size: 0.6rem;
      color: var(--text-gray);
      text-transform: uppercase;
      margin-top: 4px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mystery-item-price {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 4px;
    }
    .price-diamond {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      color: var(--red-primary);
    }
    .price-old {
      font-size: 0.5rem;
      color: var(--text-gray);
      text-decoration: line-through;
    }
    .discount-tag {
      position: absolute;
      top: 4px;
      right: 4px;
      background: var(--red-primary);
      color: white;
      font-size: 0.5rem;
      font-weight: 700;
      padding: 2px 4px;
    }

    /* === FASHION BUNDLES === */
    .fashion-section {
      margin: 8px 16px;
    }
    .fashion-featured {
      display: flex;
      justify-content: center;
      margin-bottom: 16px;
    }

    .featured-character {
      position: relative;
      background: linear-gradient(180deg, rgba(255, 0, 0, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%);
      border: 1px solid rgba(255, 0, 0, 0.3);
      min-height: 200px;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    @media (min-width: 768px) {
      .featured-character { min-height: 300px; }
    }
    .featured-character img {
      max-height: 100%;
      transition: transform 0.5s ease;
    }
    .featured-character:hover img {
      filter: brightness(1.5) drop-shadow(0 0 30px var(--red-primary));
    }
    .featured-character:hover {
      border-color: var(--red-primary);
      box-shadow: 0 10px 30px rgb(255, 0, 0);
    }
    .new-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--red-primary);
      color: white;
      padding: 4px 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.65rem;
      font-weight: 700;
      animation: pulseBadge 2s infinite;
    }

    /* === MAIN PRODUCT GRID === */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 8px 16px;
    }
    @media (min-width: 768px) {
      .product-grid { grid-template-columns: repeat(4, 1fr); gap: 16px; }
    }

    .product-card {
      background: var(--bg-card);
      border: 1px solid rgba(255, 0, 0, 0.2);
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.4s ease;
    }
    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255, 0, 0, 0.1) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .product-card:hover::before { opacity: 1; }
    .product-card:hover {
      border-color: var(--red-primary);
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgb(255, 0, 0);
    }
    .product-card:active {
      transform: scale(0.98);
      box-shadow: 0 0 50px var(--red-glow);
    }

    .product-img-box {
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, rgba(255, 0, 0, 0.05) 0%, transparent 70%);
      position: relative;
    }
    @media (min-width: 768px) {
      .product-img-box { height: 180px; }
    }
    .product-img-box img {
      max-width: 70%;
      max-height: 70%;
      transition: all 0.5s ease;
      filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.3));
    }
    .product-card:hover .product-img-box img {
      transform: scale(1.15) rotate(5deg);
      filter: drop-shadow(0 0 30px var(--red-glow)) brightness(1.2);
    }

    .product-info {
      padding: 10px;
      border-top: 1px solid rgba(255, 0, 0, 0.1);
      background: rgba(0, 0, 0, 0.3);
    }
    .product-category {
      font-size: 0.55rem;
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .product-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      color: var(--text-white);
      margin: 2px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    @media (min-width: 768px) {
      .product-name { font-size: 0.9rem; }
    }
    .product-price-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }
    .product-price {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      color: var(--red-primary);
    }
    .product-buy-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid var(--red-primary);
      color: var(--red-primary);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .product-buy-btn:hover {
      background: var(--red-primary);
      color: white;
    }

    /* === TIMER DISPLAY === */
    .timer-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid var(--red-primary);
      padding: 4px 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: var(--red-primary);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .timer-dot {
      width: 6px;
      height: 6px;
      background: var(--red-primary);
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* === RESPONSIVE MOBILE ADJUSTMENTS === */
    @media (max-width: 640px) {
      .main-header { padding: 6px 0; }
      .logo-icon { width: 28px; height: 28px; }
      .exit-btn { padding: 6px 12px; font-size: 0.65rem; }
      .section-title { font-size: 1rem; }
      .mystery-items { gap: 4px; }
      .mystery-item { padding: 4px; }
      .character-mascot { height: 250px; }
      .mystery-content { grid-template-columns: 150px 1fr; }
      #intro-guide-container {
        flex-direction: column-reverse;

      const itemType = urlParams.get('item_type');

      if (paymentStatus === 'success' && itemId) {
        // Payment successful - trigger download
        let item = null;
        if (itemType === 'mystery') {
          item = mysteryItems.find(i => i.id === parseInt(itemId));

          item = fashionFeatured;

        if (item) {
          triggerDownload(item);

        // Clean URL
        window.history.replaceState({}, document.title, window.location.pathname);
      } else if (paymentStatus === 'cancel' || paymentStatus === 'failed') {
        // Payment failed/cancelled - show warning
        showWarningPopup();
        window.history.replaceState({}, document.title, window.location.pathname);
      }
    }

      const pending = localStorage.getItem('pendingPurchase');
      if (pending) {
        const purchaseData = JSON.parse(pending);
        const timeElapsed = Date.now() - purchaseData.timestamp;
        
        // If more than 10 minutes passed, consider it abandoned
        if (timeElapsed > 600000) {
          localStorage.removeItem('pendingPurchase');
          showWarningPopup();
        }
      }
    }

      // Store pending purchase
      const purchaseData = {
        item: item,
        type: type,
        id: id,
        timestamp: Date.now()
      };
      localStorage.setItem('pendingPurchase', JSON.stringify(purchaseData));

      // Build return URL
      const returnUrl = encodeURIComponent(`${window.location.origin}${window.location.pathname}?payment=success&item_id=${id}&item_type=${type}`);
      const cancelUrl = encodeURIComponent(`${window.location.origin}${window.location.pathname}?payment=cancel`);

      // Redirect to payment
      window.location.href = item.paymentLink;
    }

      localStorage.removeItem('pendingPurchase');
      
      // Show download popup
      downloadItemName.textContent = `Downloading: ${item.name}`;

    // ========================================
    // BACKGROUND ANIMATION (GALAXY)
    // ========================================
    const canvas = document.getElementById('galaxy-bg');
    const ctx = canvas.getContext('2d');
    let width = 0;
    let height = 0;
    const stars = [];
    const nebulaClouds = [];

    function initCanvas() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;

      stars.length = 0;
      for (let i = 0; i < 150; i++) {
        stars.push({
          x: Math.random() * width,
          y: Math.random() * height,
          size: Math.random() * 1.5 + 0.5,
          speed: Math.random() * 0.5 + 0.1,
          opacity: Math.random()
        });
      }

      nebulaClouds.length = 0;
      for (let i = 0; i < 5; i++) {
        nebulaClouds.push({
          x: Math.random() * width,
          y: Math.random() * height,
          radius: Math.max(100, Math.random() * 300 + 100),
          speedX: (Math.random() - 0.5) * 0.3,
          speedY: (Math.random() - 0.5) * 0.3
        });
      }
    }

    function animateCanvas() {
      ctx.fillStyle = '#050000';
      ctx.fillRect(0, 0, width, height);

      nebulaClouds.forEach(cloud => {
        cloud.x += cloud.speedX;
        cloud.y += cloud.speedY;

        if (cloud.x < -cloud.radius) cloud.x = width + cloud.radius;
        if (cloud.x > width + cloud.radius) cloud.x = -cloud.radius;
        if (cloud.y < -cloud.radius) cloud.y = height + cloud.radius;
        if (cloud.y > height + cloud.radius) cloud.y = -cloud.radius;

        const gradient = ctx.createRadialGradient(
          cloud.x, cloud.y, 0,
          cloud.x, cloud.y, cloud.radius
        );
        gradient.addColorStop(0, 'rgba(255, 0, 0, 0.08)');
        gradient.addColorStop(0.5, 'rgba(139, 0, 0, 0.04)');
        gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.beginPath();
        ctx.arc(cloud.x, cloud.y, cloud.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      });

      stars.forEach(star => {
        star.y += star.speed;
        if (star.y > height) {
          star.y = 0;
          star.x = Math.random() * width;
        }

        star.opacity += (Math.random() - 0.5) * 0.05;
        star.opacity = Math.max(0.2, Math.min(1, star.opacity));

        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 0, 0, ${star.opacity})`;
        ctx.fill();

        if (Math.random() > 0.95) {
          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ff0000';
        }
      });

      ctx.shadowBlur = 0;
      requestAnimationFrame(animateCanvas);
    }

    // ========================================
    // INITIALIZE
    // ========================================
    window.addEventListener('resize', initCanvas);

    // Initial render
    initCanvas();
    animateCanvas();
    renderMysteryItems();
    renderProducts();
    setupFashionFeatured();

    // Check for payment return on page load
    checkPaymentReturn();

    // Start intro scene
    window.addEventListener('load', () => {
      startIntro();
    });
  </script>
</body>
</html>

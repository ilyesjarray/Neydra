<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEYDRA — System Update Required</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    .update-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      z-index: 10;
    }

    .warning-text {
      color: #ff0000;
      font-size: 1.2rem;
      letter-spacing: 4px;
      margin-bottom: 50px;
      text-transform: uppercase;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
      animation: pulseText 2s infinite;
    }

    @keyframes pulseText {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 0 0 25px rgba(255, 0, 0, 0.8); }
    }

    .install-btn {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid rgba(255, 0, 0, 0.3);
      color: #ff0000;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.15), inset 0 0 30px rgba(255, 0, 0, 0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .install-btn::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, rgba(255, 0, 0, 0.8), transparent);
      animation: spin 3s linear infinite;
      z-index: 0;
      opacity: 0.5;
    }

    .install-btn::after {
      content: '';
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: #000;
      z-index: 1;
    }

    .install-btn span {
      position: relative;
      z-index: 2;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .install-btn:hover {
      box-shadow: 0 0 80px rgba(255, 0, 0, 0.4), inset 0 0 50px rgba(255, 0, 0, 0.2);
      transform: scale(1.05);
      border-color: rgba(255, 0, 0, 0.8);
    }
    
    .install-btn:active {
      transform: scale(0.95);
    }

    /* Ambient background glow */
    .bg-glow {
      position: absolute;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(255,0,0,0.1) 0%, transparent 60%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      animation: pulseGlow 4s ease-in-out infinite;
    }
    
    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .sub-text {
      margin-top: 40px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="update-container">
    <div class="warning-text">SYSTEM UPDATE DETECTED</div>
    <button class="install-btn" id="installBtn" onclick="installUpdates()">
      <span>INSTALL<br><br>UPDATES</span>
    </button>
    <div class="sub-text">This will clear your local cache and initialize the latest version of NEYDRA.</div>
  </div>

  <script>
    const CURRENT_VERSION = 'v2.0.0-tier3'; // Must match the one in welcome/index.html

    async function installUpdates() {
      const btn = document.getElementById('installBtn');
      const text = btn.querySelector('span');
      text.innerHTML = 'UPDATING<br><br>...';
      btn.style.pointerEvents = 'none';
      btn.style.borderColor = '#ff0000';
      btn.style.boxShadow = '0 0 100px rgba(255,0,0,0.6), inset 0 0 60px rgba(255,0,0,0.4)';

      try {
        // 1. Unregister Service Workers
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          for (let registration of registrations) {
            await registration.unregister();
          }
        }

        // 2. Clear Caches API
        if ('caches' in window) {
          const keys = await caches.keys();
          for (let key of keys) {
            await caches.delete(key);
          }
        }

        // 3. Clear Storage
        localStorage.clear();
        sessionStorage.clear();

        // 4. Set new version
        localStorage.setItem('neydra_version', CURRENT_VERSION);

        // 5. Redirect back to welcome
        setTimeout(() => {
          text.innerHTML = 'SUCCESS';
          setTimeout(() => {
            window.location.replace('/welcome');
          }, 800);
        }, 1500);

      } catch (e) {
        console.error('Update failed:', e);
        // Fallback to just setting version and redirecting
        localStorage.setItem('neydra_version', CURRENT_VERSION);
        window.location.replace('/welcome');
      }
    }
  </script>
</body>
</html>

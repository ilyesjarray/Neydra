<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA AI — Choose Your Model" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/assets/icon.png" type="image/png" />
  <link rel="stylesheet" href="/welcome/aiassistants/aiassistants.css" />
  <title>NEYDRA — Choose Your Model</title>
  <style>
    .models-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:30px; padding:10px 40px 40px; width:100%; max-width:1100px; z-index:5; position:relative; }
    @media(max-width:900px) { .models-grid { grid-template-columns:1fr; gap:20px; padding:10px 20px 30px; max-width:400px; } }
    /* Tier badges */
    .tier-badge { position:absolute; top:12px; right:12px; font-family:var(--font-display); font-size:.55rem; letter-spacing:2px; text-transform:uppercase; padding:4px 10px; border-radius:6px; z-index:3; }
    .tier-low { background:rgba(255,255,255,.06); color:#888; border:1px solid rgba(255,255,255,.08); }
    .tier-medium { background:rgba(255,0,0,.08); color:#ff4444; border:1px solid rgba(255,0,0,.2); box-shadow:0 0 10px rgba(255,0,0,.1); }
    .tier-high { background:rgba(255,0,0,.15); color:#ff0000; border:1px solid rgba(255,0,0,.4); box-shadow:0 0 20px rgba(255,0,0,.2); animation:tierPulse 2s ease-in-out infinite; }
    @keyframes tierPulse { 0%,100%{box-shadow:0 0 10px rgba(255,0,0,.2)} 50%{box-shadow:0 0 25px rgba(255,0,0,.4)} }
    /* Model card overrides */
    .model-card { position:relative; border-radius:16px; overflow:hidden; cursor:pointer; opacity:0; transform:translateY(40px) scale(.92); transition:transform .5s cubic-bezier(.34,1.56,.64,1), box-shadow .5s ease; aspect-ratio:3/4; background:#0a0a0a; perspective:800px; }
    .model-card.revealed { opacity:1; transform:translateY(0) scale(1); }
    .model-card img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .4s ease; }
    .model-card:hover img { transform:scale(1.05); }
    .model-card-info { position:absolute; bottom:0; left:0; right:0; padding:18px; background:linear-gradient(0deg,rgba(0,0,0,.95) 0%,rgba(0,0,0,.7) 50%,transparent 100%); }
    .model-card-name { font-family:var(--font-display); font-size:clamp(.7rem,1.5vw,.95rem); letter-spacing:3px; text-transform:uppercase; color:#fff; margin-bottom:4px; }
    .model-card-desc { font-family:var(--font-tech); font-size:.65rem; color:#777; letter-spacing:1px; line-height:1.4; }
    /* Card tier glow effects */
    .card-low { border:1px solid rgba(255,255,255,.06); }
    .card-low:hover { box-shadow:0 0 15px rgba(255,0,0,.15), 0 8px 30px rgba(0,0,0,.5); transform:translateY(-5px) scale(1.03); }
    .card-medium { border:1px solid rgba(255,0,0,.15); box-shadow:0 0 10px rgba(255,0,0,.1); }
    .card-medium:hover { box-shadow:0 0 25px rgba(255,0,0,.3), 0 0 50px rgba(255,0,0,.1), 0 8px 30px rgba(0,0,0,.5); transform:translateY(-6px) scale(1.04); }
    /* Animated neon border for medium */
    .card-medium::before { content:''; position:absolute; inset:-1px; border-radius:17px; background:conic-gradient(from var(--angle,0deg),transparent 60%,rgba(255,0,0,.3) 80%,transparent 100%); z-index:-1; animation:rotateBorder 4s linear infinite; }
    @keyframes rotateBorder { to { --angle:360deg; } }
    @property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
    /* MAX tier — Builder */
    .card-high { border:1px solid rgba(255,0,0,.3); box-shadow:0 0 20px rgba(255,0,0,.2), 0 0 40px rgba(255,0,0,.08); }
    .card-high:hover { box-shadow:0 0 40px rgba(255,0,0,.5), 0 0 80px rgba(255,0,0,.2), 0 0 120px rgba(255,0,0,.08), 0 8px 30px rgba(0,0,0,.5); transform:translateY(-8px) scale(1.05); }
    .card-high::before { content:''; position:absolute; inset:-2px; border-radius:18px; background:conic-gradient(from var(--angle,0deg),#ff0000,transparent 30%,#ff0000 50%,transparent 80%,#ff0000); z-index:-1; animation:rotateBorder 3s linear infinite; opacity:.4; }
    .card-high::after { content:''; position:absolute; inset:0; border-radius:16px; background:linear-gradient(135deg,rgba(255,0,0,.05) 0%,transparent 50%,rgba(255,0,0,.03) 100%); pointer-events:none; animation:holographicShimmer 3s ease-in-out infinite; z-index:2; }
    @keyframes holographicShimmer { 0%,100%{opacity:.3;background-position:0% 50%} 50%{opacity:.7;background-position:100% 50%} }
  </style>
</head>
<body>
  <audio id="ai-theme2" src="/assets/aiassistants/aitheme-music2.mp3" loop preload="auto"></audio>
  <canvas id="galaxyCanvas" class="galaxy-canvas"></canvas>
  <button class="back-btn" onclick="goBack()" title="Back">◂</button>

  <div class="selection-screen" id="selectionScreen">
    <h1 class="selection-title" id="selTitle" style="opacity:0;">Choose Your Model</h1>
    <div class="models-grid" id="modelsGrid"></div>
  </div>

  <script>
    const MODELS = [
      {
        id: 1, name: 'Friend', slug: 'friend', tier: 'low',
        desc: 'Casual companion — cheerful, honest, simple.',
        color: 'rgba(255, 0, 0, 0.3)'
      },
      {
        id: 2, name: 'Professor', slug: 'professor', tier: 'medium',
        desc: 'Scholar — country-aware, deep research, engaging.',
        color: 'rgba(255, 0, 0, 0.5)'
      },
      {
        id: 3, name: 'Builder', slug: 'builder', tier: 'high',
        desc: 'Agent Swarm — builds complete projects from scratch.',
        color: 'rgba(255, 0, 0, 0.7)'
      }
    ];

    const TIER_LABELS = { low: 'Basic', medium: 'Advanced', high: 'Elite' };

    // Galaxy particles — selection variant
    (function initGalaxy() {
      const canvas = document.getElementById('galaxyCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      const particles = []; const TOTAL = 300;
      for (let i = 0; i < TOTAL; i++) {
        particles.push({
          x: Math.random() * (W || 1920), y: Math.random() * (H || 1080),
          r: 0.2 + Math.random() * 1.8, vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
          a: Math.random() * 0.4 + 0.05, aDir: 1, ts: 0.002 + Math.random() * 0.005
        });
      }
      function render() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          p.a += p.aDir * p.ts;
          if (p.a > 0.55) { p.a = 0.55; p.aDir = -1; }
          if (p.a < 0.03) { p.a = 0.03; p.aDir = 1; }
          p.x += p.vx + Math.sin(Date.now() * 0.0003 + p.y * 0.005) * 0.08;
          p.y += p.vy;
          if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
          if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,0,0,${p.a})`;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
          if (p.r > 1.2) {
            ctx.beginPath();
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
            g.addColorStop(0, `rgba(255,0,0,${p.a * 0.2})`);
            g.addColorStop(1, 'rgba(255,0,0,0)');
            ctx.fillStyle = g;
            ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        requestAnimationFrame(render);
      }
      render();
    })();

    // Build cards
    const grid = document.getElementById('modelsGrid');
    MODELS.forEach((model, idx) => {
      const card = document.createElement('div');
      card.className = `model-card card-${model.tier}`;
      card.id = `card-${model.id}`;
      card.innerHTML = `
        <span class="tier-badge tier-${model.tier}">${TIER_LABELS[model.tier]}</span>
        <img src="/assets/aiassistants/botcards/${model.slug}card.png" alt="${model.name}" />
        <div class="model-card-info">
          <div class="model-card-name">${model.name}</div>
          <div class="model-card-desc">${model.desc}</div>
        </div>
      `;
      card.addEventListener('click', () => selectModel(model));
      grid.appendChild(card);
    });

    // Fullscreen
    function goFullscreenLandscape() {
      const elem = document.documentElement;
      const rfs = elem.requestFullscreen || elem.webkitRequestFullscreen || elem.mozRequestFullScreen || elem.msRequestFullscreen;
      if (rfs) rfs.call(elem).then(() => { if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {}); }).catch(() => {});
    }

    // Init
    window.addEventListener('DOMContentLoaded', () => {
      goFullscreenLandscape();
      const music = document.getElementById('ai-theme2');
      music.volume = 0.5;
      music.play().catch(() => { document.addEventListener('click', function r() { music.play().catch(() => {}); document.removeEventListener('click', r); }, { once: true }); });
      setTimeout(() => { document.getElementById('selTitle').style.transition = 'opacity 1s ease'; document.getElementById('selTitle').style.opacity = '1'; }, 300);
      const cards = document.querySelectorAll('.model-card');
      cards.forEach((card, i) => {
        setTimeout(() => {
          card.classList.add('revealed');
          const modelData = MODELS.find(m => m.id === parseInt(card.id.split('-')[1]));
          if (modelData) card.style.setProperty('--card-glow', modelData.color);
        }, 600 + i * 300);
      });
    });

    function selectModel(model) {
      try { sessionStorage.setItem('neydra_bot', JSON.stringify(model)); } catch (e) {}
      const music = document.getElementById('ai-theme2');
      let vol = music.volume;
      const fade = setInterval(() => { vol -= 0.05; if (vol <= 0) { clearInterval(fade); music.pause(); } else music.volume = vol; }, 60);
      document.getElementById('selectionScreen').style.transition = 'opacity 0.8s ease';
      document.getElementById('selectionScreen').style.opacity = '0';
      setTimeout(() => { window.location.href = '/welcome/aiassistants/' + model.slug; }, 900);
    }

    function goBack() {
      const music = document.getElementById('ai-theme2');
      if (music) { music.pause(); music.currentTime = 0; }
      window.location.href = '/welcome/aiassistants';
    }
    window.addEventListener('beforeunload', () => { const m = document.getElementById('ai-theme2'); if (m) { m.pause(); m.currentTime = 0; } });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA AI Assistants — Choose Your Companion" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/assets/icon.png" type="image/png" />
  <link rel="stylesheet" href="/welcome/aiassistants/aiassistants.css" />
  <title>NEYDRA — Choose Your Assistant</title>
</head>

<body>

  <!-- Audio -->
  <audio id="ai-theme2" src="/assets/aiassistants/aitheme-music2.mp3" loop preload="auto"></audio>

  <!-- Galaxy Particle Canvas -->
  <canvas id="galaxyCanvas" class="galaxy-canvas"></canvas>

  <!-- Back button -->
  <button class="back-btn" onclick="goBack()" title="Back">◂</button>

  <!-- Selection Screen -->
  <div class="selection-screen" id="selectionScreen">
    <h1 class="selection-title" id="selTitle" style="opacity:0;">Choose Your Assistant</h1>

    <div class="cards-grid" id="cardsGrid">
      <!-- Cards injected by JS -->
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // BOT DATA
    // ═══════════════════════════════════════════════════════
    const BOTS = [
      { id: 1, name: 'Katara', slug: 'katara', gender: 'male', color: 'rgba(255, 0, 0, 0.5)' },
      { id: 2, name: 'Sakura', slug: 'sakura', gender: 'female', color: 'rgba(255, 0, 0, 0.5)' },
      { id: 3, name: 'Olivia', slug: 'olivia', gender: 'female', color: 'rgba(255, 98, 0, 0.5)' },
      { id: 4, name: 'Hinata', slug: 'hinata', gender: 'female', color: 'rgba(255, 255, 255, 0.5)' },
      { id: 5, name: 'Luna', slug: 'luna', gender: 'female', color: 'rgba(138, 0, 0, 0.5)' },
      { id: 6, name: 'Elara', slug: 'elara', gender: 'female', color: 'rgba(255, 187, 0, 0.5)' },
      { id: 7, name: 'Nova', slug: 'nova', gender: 'female', color: 'rgba(255, 106, 0, 0.5)' },
      { id: 8, name: 'Yuki', slug: 'yuki', gender: 'female', color: 'rgba(18, 217, 0, 0.5)' }
    ];

    // ═══════════════════════════════════════════════════════
    // GALAXY PARTICLE SYSTEM (Selection variant — more colorful)
    // ═══════════════════════════════════════════════════════
    (function initGalaxy() {
      const canvas = document.getElementById('galaxyCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const particles = [];
      const TOTAL = 350;
      const TYPES = [
        { color: [255, 0, 0], minR: 0.4, maxR: 2, speed: 0.25 },
        { color: [255, 0, 0], minR: 0.3, maxR: 1.5, speed: 0.4 },
        { color: [255, 0, 0], minR: 0.6, maxR: 2.2, speed: 0.15 },
        { color: [255, 0, 0], minR: 0.15, maxR: 0.7, speed: 0.5 },
        { color: [255, 0, 0], minR: 0.3, maxR: 1.8, speed: 0.2 },
        { color: [255, 0, 0], minR: 0.2, maxR: 1, speed: 0.35 }
      ];

      for (let i = 0; i < TOTAL; i++) {
        const t = TYPES[Math.floor(Math.random() * TYPES.length)];
        particles.push({
          x: Math.random() * (W || 1920),
          y: Math.random() * (H || 1080),
          r: t.minR + Math.random() * (t.maxR - t.minR),
          vx: (Math.random() - 0.5) * t.speed,
          vy: (Math.random() - 0.5) * t.speed,
          a: Math.random() * 0.5 + 0.05,
          aDir: 1,
          c: t.color,
          ts: 0.002 + Math.random() * 0.006
        });
      }

      function render() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          p.a += p.aDir * p.ts;
          if (p.a > 0.65) { p.a = 0.65; p.aDir = -1; }
          if (p.a < 0.03) { p.a = 0.03; p.aDir = 1; }
          p.x += p.vx + Math.sin(Date.now() * 0.0003 + p.y * 0.005) * 0.1;
          p.y += p.vy;
          if (p.x < -10) p.x = W + 10;
          if (p.x > W + 10) p.x = -10;
          if (p.y < -10) p.y = H + 10;
          if (p.y > H + 10) p.y = -10;

          ctx.beginPath();
          ctx.fillStyle = `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.a})`;
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();

          if (p.r > 1.3) {
            ctx.beginPath();
            const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 5);
            g.addColorStop(0, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.a * 0.25})`);
            g.addColorStop(1, `rgba(${p.c[0]},${p.c[1]},${p.c[2]},0)`);
            ctx.fillStyle = g;
            ctx.arc(p.x, p.y, p.r * 5, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        requestAnimationFrame(render);
      }
      render();
    })();

    // ═══════════════════════════════════════════════════════
    // FULLSCREEN LANDSCAPE
    // ═══════════════════════════════════════════════════════
    function goFullscreenLandscape() {
      const elem = document.documentElement;
      const rfs = elem.requestFullscreen || elem.webkitRequestFullscreen || elem.mozRequestFullScreen || elem.msRequestFullscreen;
      if (rfs) {
        rfs.call(elem).then(() => {
          if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => { });
          }
        }).catch(() => { });
      }
    }

    // ═══════════════════════════════════════════════════════
    // DYNAMIC COLOR EXTRACTION REMOVED
    // Colors are now manually defined in the BOTS array above.
    // ═══════════════════════════════════════════════════════

    // ═══════════════════════════════════════════════════════
    // BUILD CARDS + STAGGERED REVEAL
    // ═══════════════════════════════════════════════════════
    const grid = document.getElementById('cardsGrid');

    BOTS.forEach((bot, idx) => {
      const card = document.createElement('div');
      card.className = 'bot-card neon-glow';
      card.id = `card-${bot.id}`;
      card.setAttribute('data-bot', bot.slug);
      card.innerHTML = `
        <img src="/assets/aiassistants/botcards/bot${bot.id}card.png" alt="${bot.name}" crossorigin="anonymous" />
        <div class="bot-card-name">${bot.name}</div>
      `;

      card.addEventListener('click', () => {
        selectBot(bot);
      });

      grid.appendChild(card);
    });

    // ═══════════════════════════════════════════════════════
    // INIT: Fullscreen + Music + Staggered animation
    // ═══════════════════════════════════════════════════════
    window.addEventListener('DOMContentLoaded', () => {
      goFullscreenLandscape();

      // Play music
      const music = document.getElementById('ai-theme2');
      music.volume = 0.5;
      music.play().catch(() => {
        // Retry on first click
        document.addEventListener('click', function retryMusic() {
          music.play().catch(() => { });
          document.removeEventListener('click', retryMusic);
        }, { once: true });
      });

      // Fade in title
      setTimeout(() => {
        const title = document.getElementById('selTitle');
        title.style.transition = 'opacity 1s ease';
        title.style.opacity = '1';
      }, 300);

      // Staggered card reveal + apply manual color
      const cards = document.querySelectorAll('.bot-card');
      cards.forEach((card, i) => {
        setTimeout(() => {
          card.classList.add('revealed');
          // Get the bot ID from the card and find its manual color
          const botId = parseInt(card.id.split('-')[1]);
          const botData = BOTS.find(b => b.id === botId);
          if (botData) {
            card.style.setProperty('--card-glow', botData.color);
          }
        }, 600 + i * 200); // 0.2s stagger, start after 0.6s
      });
    });

    // ═══════════════════════════════════════════════════════
    // BOT SELECTION — Navigate to bot page
    // ═══════════════════════════════════════════════════════
    function selectBot(bot) {
      // Store selected bot info for the chat page
      try {
        sessionStorage.setItem('neydra_bot', JSON.stringify(bot));
      } catch (e) { }

      // Fade out music
      const music = document.getElementById('ai-theme2');
      let vol = music.volume;
      const fade = setInterval(() => {
        vol -= 0.05;
        if (vol <= 0) { clearInterval(fade); music.pause(); }
        else music.volume = vol;
      }, 60);

      // Visual fade
      document.getElementById('selectionScreen').style.transition = 'opacity 0.8s ease';
      document.getElementById('selectionScreen').style.opacity = '0';

      setTimeout(() => {
        window.location.href = '/welcome/aiassistants/' + bot.slug;
      }, 900);
    }

    function goBack() {
      const music = document.getElementById('ai-theme2');
      if (music) { music.pause(); music.currentTime = 0; }
      window.location.href = '/welcome/aiassistants';
    }

    // Cleanup
    window.addEventListener('beforeunload', () => {
      const m = document.getElementById('ai-theme2');
      if (m) { m.pause(); m.currentTime = 0; }
    });
  </script>
</body>

</html>

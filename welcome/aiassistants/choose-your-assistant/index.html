<!DOCTYPE html>
<html lang="en">
<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA AI — Choose Your Model" />
  <meta name="theme-color" content="#000000" />
  <link rel="icon" href="/assets/icon.png" type="image/png" />
  <link rel="stylesheet" href="/welcome/aiassistants/aiassistants.css" />
  <title>NEYDRA — Choose Your Model</title>
  <style>
    /* ═══════════════════════════════════════════════════
       GAME RANKING CARD SYSTEM — Premium Tier Design
       Inspired by top-3 leaderboard / gacha card aesthetics
       ═══════════════════════════════════════════════════ */

    .models-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 36px;
      padding: 0 50px 50px;
      width: 100%;
      max-width: 1200px;
      z-index: 5;
      position: relative;
      align-items: end;
    }

    @media(max-width:900px) {
      .models-grid {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 0 24px 40px;
        max-width: 420px;
        align-items: stretch;
      }
    }

    /* ── Base Card ── */
    .model-card {
      position: relative;
      border-radius: 20px;
      overflow: visible;
      cursor: pointer;
      opacity: 0;
      transform: translateY(60px) scale(.85);
      transition: transform .6s cubic-bezier(.22, 1, .36, 1), filter .4s ease;
      aspect-ratio: 3/4.2;
      background: #080808;
      z-index: 1;
    }
    .model-card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .model-card:hover { z-index: 10; }

    /* Inner wrapper clips image */
    .card-inner {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      overflow: hidden;
      z-index: 2;
    }
    .card-inner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .5s cubic-bezier(.22, 1, .36, 1), filter .5s ease;
    }
    .model-card:hover .card-inner img {
      transform: scale(1.08);
      filter: brightness(1.1) saturate(1.1);
    }

    /* ── Card Info Bar ── */
    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 18px 16px;
      background: linear-gradient(0deg, rgba(0,0,0,.97) 0%, rgba(0,0,0,.8) 40%, rgba(0,0,0,.4) 70%, transparent 100%);
      z-index: 4;
      border-radius: 0 0 20px 20px;
    }
    .card-info .card-name {
      font-family: var(--font-display);
      font-size: clamp(.85rem, 1.8vw, 1.1rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 5px;
    }
    .card-info .card-desc {
      font-family: var(--font-tech);
      font-size: clamp(.6rem, 1vw, .72rem);
      color: rgba(255,255,255,.5);
      letter-spacing: .8px;
      line-height: 1.5;
    }

    /* ── Tier Badge ── */
    .tier-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-family: var(--font-display);
      font-size: .5rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      z-index: 5;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    /* ── Rank Number ── */
    .rank-number {
      position: absolute;
      top: -18px;
      left: 16px;
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2.5rem;
      z-index: 6;
      line-height: 1;
      -webkit-text-stroke: 1px rgba(255,255,255,.1);
    }

    /* ═══════════════════════════════════
       TIER 1: FRIEND — Bronze / Basic
       Clean, subtle, no flashiness
       ═══════════════════════════════════ */
    .card-low .rank-number { color: rgba(180,120,60,.7); text-shadow: 0 0 15px rgba(180,120,60,.3); }
    .card-low .tier-badge { background: rgba(180,120,60,.1); color: #b4783c; border: 1px solid rgba(180,120,60,.25); }
    .card-low .card-border {
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      border: 1px solid rgba(180,120,60,.15);
      z-index: 3;
      pointer-events: none;
    }
    .card-low:hover .card-border { border-color: rgba(180,120,60,.35); }
    .card-low:hover {
      transform: translateY(-8px) scale(1.02);
      filter: drop-shadow(0 15px 30px rgba(180,120,60,.15));
    }

    /* ═══════════════════════════════════
       TIER 2: PROFESSOR — Silver / Advanced
       Animated rotating border, ambient glow
       ═══════════════════════════════════ */
    .card-medium .rank-number { color: rgba(200,200,220,.7); text-shadow: 0 0 20px rgba(200,200,220,.4); }
    .card-medium .tier-badge {
      background: rgba(200,200,220,.08);
      color: #c8c8dc;
      border: 1px solid rgba(200,200,220,.25);
      box-shadow: 0 0 12px rgba(200,200,220,.1);
    }

    /* Rotating conic-gradient border */
    .card-medium::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 22px;
      z-index: 0;
      background: conic-gradient(from var(--angle, 0deg), transparent, rgba(200,200,220,.4), transparent, rgba(200,200,220,.2), transparent);
      animation: spinBorder 5s linear infinite;
    }
    .card-medium::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: #080808;
      z-index: 1;
    }
    @property --angle { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
    @keyframes spinBorder { to { --angle: 360deg; } }

    /* Ambient glow underneath */
    .card-medium .card-glow {
      position: absolute;
      inset: -20px;
      border-radius: 30px;
      background: radial-gradient(ellipse at 50% 80%, rgba(200,200,220,.08), transparent 70%);
      z-index: -1;
      opacity: 0;
      transition: opacity .5s ease;
    }
    .card-medium:hover .card-glow { opacity: 1; }
    .card-medium:hover {
      transform: translateY(-12px) scale(1.03);
      filter: drop-shadow(0 20px 40px rgba(200,200,220,.12));
    }

    /* ═══════════════════════════════════
       TIER 3: BUILDER — Gold-Red / Elite
       Full animated border, particle aura,
       holographic shimmer, floating effect
       ═══════════════════════════════════ */
    .card-high {
      animation: eliteFloat 4s ease-in-out infinite;
    }
    .card-high.revealed {
      transform: translateY(0) scale(1.03);
    }
    @keyframes eliteFloat {
      0%, 100% { transform: translateY(0) scale(1.03); }
      50% { transform: translateY(-6px) scale(1.03); }
    }

    .card-high .rank-number {
      color: rgba(255,40,40,.9);
      text-shadow: 0 0 25px rgba(255,0,0,.6), 0 0 50px rgba(255,0,0,.3);
      animation: rankPulse 2s ease-in-out infinite;
    }
    @keyframes rankPulse {
      0%, 100% { text-shadow: 0 0 20px rgba(255,0,0,.5), 0 0 40px rgba(255,0,0,.2); }
      50% { text-shadow: 0 0 30px rgba(255,0,0,.8), 0 0 60px rgba(255,0,0,.4), 0 0 80px rgba(255,0,0,.15); }
    }

    .card-high .tier-badge {
      background: rgba(255,0,0,.12);
      color: #ff3333;
      border: 1px solid rgba(255,0,0,.4);
      box-shadow: 0 0 15px rgba(255,0,0,.2), inset 0 0 8px rgba(255,0,0,.1);
      animation: badgePulse 2.5s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 10px rgba(255,0,0,.15); }
      50% { box-shadow: 0 0 20px rgba(255,0,0,.3), 0 0 35px rgba(255,0,0,.1); }
    }

    /* Double rotating border — fast + slow */
    .card-high::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 23px;
      z-index: 0;
      background: conic-gradient(from var(--angle, 0deg), #ff0000, transparent 20%, #ff0000 40%, transparent 60%, #ff0000 80%, transparent);
      animation: spinBorder 3s linear infinite;
      opacity: .5;
    }
    .card-high::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 20px;
      background: #080808;
      z-index: 1;
    }

    /* Holographic shine sweep */
    .card-high .holo-shine {
      position: absolute;
      inset: 0;
      border-radius: 20px;
      z-index: 5;
      pointer-events: none;
      overflow: hidden;
    }
    .card-high .holo-shine::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(115deg, transparent 40%, rgba(255,255,255,.05) 45%, rgba(255,255,255,.12) 50%, rgba(255,255,255,.05) 55%, transparent 60%);
      animation: holoSweep 4s ease-in-out infinite;
    }
    @keyframes holoSweep {
      0% { transform: translateX(-100%) translateY(-30%) rotate(25deg); }
      100% { transform: translateX(100%) translateY(30%) rotate(25deg); }
    }

    /* Multi-layered glow aura */
    .card-high .card-glow {
      position: absolute;
      inset: -30px;
      border-radius: 35px;
      z-index: -1;
      background: radial-gradient(ellipse at 50% 70%, rgba(255,0,0,.12), transparent 65%);
      animation: auraBreath 3s ease-in-out infinite;
    }
    @keyframes auraBreath {
      0%, 100% { opacity: .6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .card-high:hover {
      animation: none;
      transform: translateY(-14px) scale(1.06) !important;
      filter: drop-shadow(0 25px 50px rgba(255,0,0,.25)) drop-shadow(0 0 80px rgba(255,0,0,.08));
    }

    /* ═══ Particle Canvas per card ═══ */
    .card-particles {
      position: absolute;
      inset: -40px;
      z-index: 0;
      pointer-events: none;
    }

    /* ═══ Selection Title ═══ */
    .selection-title {
      font-size: clamp(1rem, 2.8vw, 1.8rem) !important;
      letter-spacing: 8px !important;
      margin-bottom: 35px !important;
    }
  </style>
</head>
<body>
  <audio id="ai-theme2" src="/assets/aiassistants/aitheme-music2.mp3" loop preload="auto"></audio>
  <canvas id="galaxyCanvas" class="galaxy-canvas"></canvas>
  <button class="back-btn" onclick="goBack()" title="Back">◂</button>

  <div class="selection-screen" id="selectionScreen">
    <h1 class="selection-title" id="selTitle" style="opacity:0;">Choose Your Model</h1>
    <div class="models-grid" id="modelsGrid"></div>
  </div>

  <script>
    const MODELS = [
      { id: 1, name: 'Friend', slug: 'friend', tier: 'low', rank: '03',
        tierLabel: 'Bronze', desc: 'Casual companion — cheerful, honest, keeps it simple.' },
      { id: 2, name: 'Professor', slug: 'professor', tier: 'medium', rank: '02',
        tierLabel: 'Silver', desc: 'Country-aware scholar — adapts to your curriculum.' },
      { id: 3, name: 'Builder', slug: 'builder', tier: 'high', rank: '01',
        tierLabel: 'Elite', desc: 'Agent swarm — builds complete projects from scratch.' }
    ];

    // Galaxy
    (function () {
      const c = document.getElementById('galaxyCanvas'), x = c.getContext('2d');
      let W, H;
      function rz() { W = c.width = innerWidth; H = c.height = innerHeight; }
      rz(); addEventListener('resize', rz);
      const ps = [];
      for (let i = 0; i < 250; i++) ps.push({
        x: Math.random() * (W || 1920), y: Math.random() * (H || 1080),
        r: .15 + Math.random() * 1.4, vx: (Math.random() - .5) * .18,
        vy: (Math.random() - .5) * .18, a: Math.random() * .35 + .03,
        d: 1, t: .002 + Math.random() * .004
      });
      function f() {
        x.clearRect(0, 0, W, H);
        for (const p of ps) {
          p.a += p.d * p.t;
          if (p.a > .5) { p.a = .5; p.d = -1; }
          if (p.a < .02) { p.a = .02; p.d = 1; }
          p.x += p.vx + Math.sin(Date.now() * .00025 + p.y * .004) * .06;
          p.y += p.vy;
          if (p.x < -10) p.x = W + 10; if (p.x > W + 10) p.x = -10;
          if (p.y < -10) p.y = H + 10; if (p.y > H + 10) p.y = -10;
          x.beginPath();
          x.fillStyle = `rgba(255,0,0,${p.a})`;
          x.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          x.fill();
          if (p.r > 1) {
            x.beginPath();
            const g = x.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
            g.addColorStop(0, `rgba(255,0,0,${p.a * .2})`);
            g.addColorStop(1, 'rgba(255,0,0,0)');
            x.fillStyle = g;
            x.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
            x.fill();
          }
        }
        requestAnimationFrame(f);
      }
      f();
    })();

    // Build cards with layered structure
    const grid = document.getElementById('modelsGrid');
    MODELS.forEach((model) => {
      const card = document.createElement('div');
      card.className = `model-card card-${model.tier}`;
      card.id = `card-${model.id}`;

      let extras = '';
      if (model.tier === 'medium' || model.tier === 'high') {
        extras += '<div class="card-glow"></div>';
      }
      if (model.tier === 'high') {
        extras += '<div class="holo-shine"></div>';
        extras += `<canvas class="card-particles" id="particles-${model.id}"></canvas>`;
      }

      card.innerHTML = `
        ${extras}
        <div class="card-inner">
          <img src="/assets/aiassistants/botcards/${model.slug}card.png" alt="${model.name}" />
        </div>
        <div class="rank-number">${model.rank}</div>
        <span class="tier-badge">${model.tierLabel}</span>
        ${model.tier !== 'low' ? '<div class="card-border"></div>' : '<div class="card-border"></div>'}
        <div class="card-info">
          <div class="card-name">${model.name}</div>
          <div class="card-desc">${model.desc}</div>
        </div>
      `;
      card.addEventListener('click', () => selectModel(model));
      grid.appendChild(card);
    });

    // Elite card particle system
    function initEliteParticles() {
      const canvas = document.getElementById('particles-3');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const rect = canvas.parentElement.getBoundingClientRect();
      canvas.width = rect.width + 80;
      canvas.height = rect.height + 80;
      const sparks = [];
      for (let i = 0; i < 30; i++) {
        sparks.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          r: .3 + Math.random() * 1.2, vx: (Math.random() - .5) * .3,
          vy: -Math.random() * .4 - .1, a: Math.random(), life: Math.random() * 200 + 100
        });
      }
      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (const s of sparks) {
          s.x += s.vx; s.y += s.vy; s.life--;
          if (s.life <= 0 || s.y < -10 || s.x < -10 || s.x > canvas.width + 10) {
            s.x = Math.random() * canvas.width;
            s.y = canvas.height + 10;
            s.life = Math.random() * 200 + 100;
            s.a = Math.random();
          }
          const alpha = Math.min(s.a, s.life / 50);
          ctx.beginPath();
          ctx.fillStyle = `rgba(255,60,20,${alpha * .7})`;
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 5);
          g.addColorStop(0, `rgba(255,0,0,${alpha * .15})`);
          g.addColorStop(1, 'rgba(255,0,0,0)');
          ctx.fillStyle = g;
          ctx.arc(s.x, s.y, s.r * 5, 0, Math.PI * 2);
          ctx.fill();
        }
        requestAnimationFrame(render);
      }
      render();
    }

    // Fullscreen
    function goFullscreenLandscape() {
      const e = document.documentElement;
      const r = e.requestFullscreen || e.webkitRequestFullscreen || e.mozRequestFullScreen;
      if (r) r.call(e).then(() => {
        if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
      }).catch(() => {});
    }

    // Init
    addEventListener('DOMContentLoaded', () => {
      goFullscreenLandscape();
      const music = document.getElementById('ai-theme2');
      music.volume = 0.5;
      music.play().catch(() => {
        document.addEventListener('click', function r() { music.play().catch(() => {}); document.removeEventListener('click', r); }, { once: true });
      });
      setTimeout(() => {
        const t = document.getElementById('selTitle');
        t.style.transition = 'opacity 1.2s ease, transform 1.2s ease';
        t.style.opacity = '1';
        t.style.transform = 'translateY(0)';
      }, 200);
      const cards = document.querySelectorAll('.model-card');
      cards.forEach((card, i) => {
        setTimeout(() => { card.classList.add('revealed'); }, 500 + i * 350);
      });
      setTimeout(initEliteParticles, 1800);
    });

    function selectModel(model) {
      try { sessionStorage.setItem('neydra_bot', JSON.stringify(model)); } catch (e) {}
      const music = document.getElementById('ai-theme2');
      let vol = music.volume;
      const fade = setInterval(() => { vol -= 0.05; if (vol <= 0) { clearInterval(fade); music.pause(); } else music.volume = vol; }, 60);
      document.getElementById('selectionScreen').style.transition = 'opacity .8s ease';
      document.getElementById('selectionScreen').style.opacity = '0';
      setTimeout(() => { location.href = '/welcome/aiassistants/' + model.slug; }, 900);
    }

    function goBack() {
      const m = document.getElementById('ai-theme2');
      if (m) { m.pause(); m.currentTime = 0; }
      location.href = '/welcome/aiassistants';
    }
    addEventListener('beforeunload', () => { const m = document.getElementById('ai-theme2'); if (m) { m.pause(); m.currentTime = 0; } });
  </script>
</body>
</html>

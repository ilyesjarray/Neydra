<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA AI — Katara Assistant" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/assets/icon.png" type="image/png" />
  <link rel="manifest" id="pwaManifest" />
  <link rel="stylesheet" href="/welcome/aiassistants/aiassistants.css" />
  <title>NEYDRA — Katara</title>
  <style>
    :root {
      --bot-accent: #ff0033;
      --bot-accent-glow: rgba(255, 0, 51, 0.4);
    }
  </style>
</head>

<body>
  <script>
    window.BOT_CONFIG = {
      id: 1,
      name: 'Katara',
      slug: 'katara',
      gender: 'male',
      accent: '#ff0033',
      voicePitch: 0.6,
      voiceRate: 0.85,
      voiceLang: 'en-US',
      idleImg: '/assets/aiassistants/bot1/bot1.png',
      thinkImg: '/assets/aiassistants/bot1/bot1thinking.png',
      shyImg: '/assets/aiassistants/bot1/bot1shy.png',
      cardImg: '/assets/aiassistants/botcards/bot1card.png'
    };
  </script>

  <audio id="bot-theme" src="/assets/aiassistants/bottheme-music.mp3" loop preload="auto"></audio>
  <canvas id="galaxyCanvas" class="galaxy-canvas"></canvas>
  <button class="back-btn" onclick="goBack()" title="Back">&#9666;</button>

  <div class="voice-call-overlay" id="voiceOverlay">
    <img class="voice-call-avatar" id="voiceAvatar" src="" alt="Avatar" />
    <div class="voice-call-name" id="voiceCallName"></div>
    <div class="voice-call-status" id="voiceStatus">Listening...</div>
    <div class="voice-waveform" id="voiceWaveform">
      <div class="bar" style="animation-delay:0s;height:10px;"></div>
      <div class="bar" style="animation-delay:0.1s;height:15px;"></div>
      <div class="bar" style="animation-delay:0.2s;height:20px;"></div>
      <div class="bar" style="animation-delay:0.3s;height:12px;"></div>
      <div class="bar" style="animation-delay:0.15s;height:18px;"></div>
      <div class="bar" style="animation-delay:0.25s;height:8px;"></div>
      <div class="bar" style="animation-delay:0.35s;height:22px;"></div>
      <div class="bar" style="animation-delay:0.05s;height:14px;"></div>
    </div>
    <button class="voice-end-btn" onclick="endVoiceCall()" title="End">&#10005;</button>
  </div>

  <div class="assistant-container" id="assistantContainer">
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div class="chat-header-left">
          <img class="chat-header-avatar" id="chatAvatar" src="" alt="Bot" />
          <div>
            <div class="chat-header-name" id="chatBotName"></div>
            <div class="chat-header-status" id="chatBotStatus">Online</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" id="voiceCallBtn" onclick="startVoiceCall()" title="Voice">&#9679;</button>
          <button class="pwa-install-btn" id="pwaInstallBtn" onclick="installPWA()" title="Install">&#8595; Install</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <div class="image-preview-row" id="imagePreviewRow"></div>
        <div class="chat-input-row">
          <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()" title="Attach">&#9673;</button>
          <input type="file" id="imageInput" accept="image/*" multiple hidden />
          <textarea class="chat-input-field" id="chatInput" placeholder="Type your message..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#9654;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var CFG = window.BOT_CONFIG;
    document.getElementById('pwaManifest').href = '/api/pwa-manifest?bot=' + CFG.id;
    document.getElementById('chatAvatar').src = CFG.cardImg;
    document.getElementById('voiceAvatar').src = CFG.cardImg;
    document.getElementById('chatBotName').textContent = CFG.name;
    document.getElementById('voiceCallName').textContent = CFG.name;
    var container = document.getElementById('assistantContainer');
    container.style.backgroundImage = "url('" + CFG.idleImg + "')";
    var preThink = new Image(); preThink.src = CFG.thinkImg;
    var preShy = new Image(); preShy.src = CFG.shyImg;

    // Galaxy particles - subtle white only
    (function() {
      var canvas = document.getElementById('galaxyCanvas');
      var ctx = canvas.getContext('2d');
      var W, H;
      function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
      resize(); window.addEventListener('resize', resize);
      var particles = [];
      for (var i = 0; i < 100; i++) {
        particles.push({ x: Math.random()*1920, y: Math.random()*1080, r: 0.2+Math.random()*1, vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15, a: Math.random()*0.25+0.02, aDir: 1, ts: 0.002+Math.random()*0.003 });
      }
      function render() {
        ctx.clearRect(0,0,W,H);
        for (var p of particles) {
          p.a += p.aDir * p.ts;
          if (p.a > 0.35) { p.a = 0.35; p.aDir = -1; }
          if (p.a < 0.02) { p.a = 0.02; p.aDir = 1; }
          p.x += p.vx; p.y += p.vy;
          if (p.x < -5) p.x = W+5; if (p.x > W+5) p.x = -5;
          if (p.y < -5) p.y = H+5; if (p.y > H+5) p.y = -5;
          ctx.beginPath();
          ctx.fillStyle = 'rgba(255,255,255,' + p.a + ')';
          ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
          ctx.fill();
        }
        requestAnimationFrame(render);
      }
      render();
    })();

    // Audio
    window.addEventListener('DOMContentLoaded', function() {
      var music = document.getElementById('bot-theme');
      music.volume = 0.35;
      music.play().catch(function() {
        document.addEventListener('click', function r() { music.play().catch(function(){}); document.removeEventListener('click', r); }, { once: true });
      });
      addBotMessage('Hello! I am ' + CFG.name + '. How can I help you?');
    });

    // State machine
    var currentState = 'idle';
    function setState(s) {
      if (currentState === s) return;
      currentState = s;
      var c = document.getElementById('assistantContainer');
      if (s === 'thinking') c.style.backgroundImage = "url('" + CFG.thinkImg + "')";
      else if (s === 'shy') c.style.backgroundImage = "url('" + CFG.shyImg + "')";
      else c.style.backgroundImage = "url('" + CFG.idleImg + "')";
      var st = document.getElementById('chatBotStatus');
      if (s === 'thinking') st.textContent = 'Thinking...';
      else if (s === 'shy') st.textContent = 'Embarrassed...';
      else st.textContent = 'Online';
    }

    // Chat
    var chatHistory = [];
    var isStreaming = false;
    var attachedImages = [];

    function addUserMessage(text, images) {
      var div = document.createElement('div');
      div.className = 'message user';
      div.textContent = text;
      if (images && images.length > 0) {
        var imgsDiv = document.createElement('div');
        imgsDiv.className = 'message-images';
        images.forEach(function(src) { var img = document.createElement('img'); img.src = src; imgsDiv.appendChild(img); });
        div.appendChild(imgsDiv);
      }
      document.getElementById('chatMessages').appendChild(div);
      scrollToBottom();
    }

    function addBotMessage(text) {
      var div = document.createElement('div');
      div.className = 'message bot';
      div.textContent = text;
      document.getElementById('chatMessages').appendChild(div);
      scrollToBottom();
    }

    function createStreamingMessage() {
      var div = document.createElement('div');
      div.className = 'message bot';
      div.innerHTML = '<span class="msg-text"></span><span class="typing-cursor"></span>';
      document.getElementById('chatMessages').appendChild(div);
      scrollToBottom();
      return div;
    }

    function scrollToBottom() {
      var msgs = document.getElementById('chatMessages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    async function sendMessage() {
      if (isStreaming) return;
      var input = document.getElementById('chatInput');
      var text = input.value.trim();
      if (!text && attachedImages.length === 0) return;
      var imgSrcs = attachedImages.slice();
      addUserMessage(text, imgSrcs);
      input.value = ''; input.style.height = 'auto';
      clearImagePreviews();

      var hasImages = imgSrcs.length > 0;
      var msgContent;
      if (hasImages) {
        var parts = [];
        if (text) parts.push({ type: 'text', text: text });
        imgSrcs.forEach(function(src) { parts.push({ type: 'image_url', image_url: { url: src } }); });
        msgContent = parts;
      } else { msgContent = text; }
      chatHistory.push({ role: 'user', content: msgContent });

      isStreaming = true;
      setState('thinking');
      document.getElementById('sendBtn').disabled = true;

      try {
        var response = await fetch('/api/groq-chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: chatHistory, botName: CFG.slug, hasImages: hasImages })
        });
        var ct = response.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          var data = await response.json();
          if (data.shy) {
            setState('shy'); addBotMessage(data.content);
            chatHistory.push({ role: 'assistant', content: data.content });
            setTimeout(function() { setState('idle'); }, 3000);
            isStreaming = false; document.getElementById('sendBtn').disabled = false; return;
          }
          if (data.error) {
            addBotMessage(data.error); setState('idle');
            isStreaming = false; document.getElementById('sendBtn').disabled = false; return;
          }
        }
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var msgEl = createStreamingMessage();
        var textSpan = msgEl.querySelector('.msg-text');
        var fullText = '';
        var buffer = '';
        while (true) {
          var result = await reader.read();
          if (result.done) break;
          buffer += decoder.decode(result.value, { stream: true });
          var lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (var line of lines) {
            if (line.startsWith('data: ')) {
              var d = line.slice(6).trim();
              if (d === '[DONE]') continue;
              try { var j = JSON.parse(d); var delta = j.choices&&j.choices[0]&&j.choices[0].delta&&j.choices[0].delta.content; if (delta) { fullText += delta; textSpan.textContent = fullText; scrollToBottom(); } } catch(e) {}
            }
          }
        }
        var cursor = msgEl.querySelector('.typing-cursor');
        if (cursor) cursor.remove();
        if (fullText) chatHistory.push({ role: 'assistant', content: fullText });
        speakText(fullText);
      } catch(err) { addBotMessage('Connection error.'); }
      setState('idle'); isStreaming = false; document.getElementById('sendBtn').disabled = false;
    }

    // Image upload
    document.getElementById('imageInput').addEventListener('change', function(e) {
      var files = Array.from(e.target.files);
      var remaining = 3 - attachedImages.length;
      files.slice(0, remaining).forEach(function(file) {
        var reader = new FileReader();
        reader.onload = function(ev) { if (attachedImages.length >= 3) return; attachedImages.push(ev.target.result); renderImagePreviews(); };
        reader.readAsDataURL(file);
      });
      e.target.value = '';
    });

    function renderImagePreviews() {
      var row = document.getElementById('imagePreviewRow');
      row.innerHTML = '';
      attachedImages.forEach(function(src, i) {
        var item = document.createElement('div');
        item.className = 'image-preview-item';
        item.innerHTML = '<img src="'+src+'" alt="Attached" /><button class="image-preview-remove" onclick="removeImage('+i+')">&#10005;</button>';
        row.appendChild(item);
      });
    }

    window.removeImage = function(idx) { attachedImages.splice(idx, 1); renderImagePreviews(); };
    function clearImagePreviews() { attachedImages = []; document.getElementById('imagePreviewRow').innerHTML = ''; }

    // Voice
    var recognition = null;
    var isVoiceActive = false;

    function speakText(text) {
      if (!text || !('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      var utter = new SpeechSynthesisUtterance(text);
      utter.lang = CFG.voiceLang; utter.pitch = CFG.voicePitch; utter.rate = CFG.voiceRate; utter.volume = 0.9;
      var voices = speechSynthesis.getVoices();
      if (voices.length > 0) {
        var pref;
        if (CFG.gender === 'female') pref = voices.find(function(v){return v.name.toLowerCase().includes('female')||v.name.toLowerCase().includes('zira')||v.name.toLowerCase().includes('samantha');});
        else pref = voices.find(function(v){return v.name.toLowerCase().includes('male')||v.name.toLowerCase().includes('david')||v.name.toLowerCase().includes('daniel');});
        if (pref) utter.voice = pref;
      }
      speechSynthesis.speak(utter);
    }

    function startVoiceCall() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert('Not supported.'); return; }
      isVoiceActive = true;
      document.getElementById('voiceOverlay').classList.add('active');
      document.getElementById('voiceCallBtn').classList.add('active');
      document.getElementById('voiceStatus').textContent = 'Listening...';
      var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRec();
      recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'en-US';
      recognition.onresult = async function(e) {
        var last = e.results[e.results.length-1];
        if (last.isFinal) {
          var text = last[0].transcript.trim();
          if (text) {
            document.getElementById('voiceStatus').textContent = 'Processing...';
            addUserMessage(text, []); chatHistory.push({ role: 'user', content: text }); setState('thinking');
            try {
              var res = await fetch('/api/groq-chat', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({messages:chatHistory,botName:CFG.slug,hasImages:false}) });
              var ctype = res.headers.get('content-type')||'';
              if (ctype.includes('application/json')) { var data = await res.json(); if (data.shy) { setState('shy'); addBotMessage(data.content); speakText(data.content); chatHistory.push({role:'assistant',content:data.content}); setTimeout(function(){setState('idle');},3000); document.getElementById('voiceStatus').textContent='Listening...'; return; } }
              var reader = res.body.getReader(); var decoder = new TextDecoder(); var fullText = ''; var buf = '';
              while (true) { var r = await reader.read(); if (r.done) break; buf += decoder.decode(r.value,{stream:true}); var lns = buf.split('\n'); buf = lns.pop()||''; for (var ln of lns) { if (ln.startsWith('data: ')) { var dd = ln.slice(6).trim(); if (dd==='[DONE]') continue; try { var jj = JSON.parse(dd); var dl = jj.choices&&jj.choices[0]&&jj.choices[0].delta&&jj.choices[0].delta.content; if (dl) fullText+=dl; } catch(x){} } } }
              if (fullText) { addBotMessage(fullText); chatHistory.push({role:'assistant',content:fullText}); speakText(fullText); }
            } catch(err) { addBotMessage('Voice error.'); }
            setState('idle'); document.getElementById('voiceStatus').textContent = 'Listening...';
          }
        }
      };
      recognition.onerror = function() { document.getElementById('voiceStatus').textContent = 'Error.'; };
      recognition.onend = function() { if (isVoiceActive) try{recognition.start();}catch(e){} };
      recognition.start();
    }

    function endVoiceCall() {
      isVoiceActive = false; if (recognition){recognition.abort();recognition=null;} speechSynthesis.cancel();
      document.getElementById('voiceOverlay').classList.remove('active'); document.getElementById('voiceCallBtn').classList.remove('active');
    }

    if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = function(){speechSynthesis.getVoices();}; speechSynthesis.getVoices(); }

    var deferredPwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); deferredPwaPrompt = e; });
    function installPWA() {
      if (deferredPwaPrompt) { deferredPwaPrompt.prompt(); deferredPwaPrompt.userChoice.then(function(){deferredPwaPrompt=null;}); }
      else alert('To install '+CFG.name+': Chrome Menu > Install app');
    }

    function goBack() { var m=document.getElementById('bot-theme'); if(m){m.pause();m.currentTime=0;} speechSynthesis.cancel(); if(recognition){recognition.abort();recognition=null;} window.location.href='/welcome/aiassistants/choose-your-assistant'; }
    window.addEventListener('beforeunload', function(){var m=document.getElementById('bot-theme');if(m){m.pause();m.currentTime=0;}speechSynthesis.cancel();});
    document.getElementById('chatInput').addEventListener('input', function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px';});
  </script>
</body>

</html>

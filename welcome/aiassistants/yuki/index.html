<!DOCTYPE html>
<html lang="en">

<head>
  <script src="/js/security.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NEYDRA AI — Yuki Assistant" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/assets/aiassistants/botcards/bot8card192.png" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/aiassistants/botcards/bot8card192.png" />
  <link rel="manifest" id="pwaManifest" />
  <link rel="stylesheet" href="/welcome/aiassistants/aiassistants.css" />
  <title>NEYDRA — Yuki</title>
  <style>
    :root {
      --bot-accent: #1f8500;
      --bot-accent-glow: rgba(24, 146, 0, 0.4);
    }
  </style>
</head>

<body>
  <script>
    window.BOT_CONFIG = {
      id: 8, name: 'Yuki', slug: 'yuki',
      gender: 'female', accent: '#1f8500',
      voicePitch: 1.25, voiceRate: 0.85,
      voiceLang: 'en-US', ttsVoice: 'diana',
      idleImg: '/assets/aiassistants/bot8/bot8.png',
      thinkImg: '/assets/aiassistants/bot8/bot8thinking.png',
      shyImg: '/assets/aiassistants/bot8/bot8shy.png',
      cardImg: '/assets/aiassistants/botcards/bot8card.png',
      icon192: '/assets/aiassistants/botcards/bot8card192.png',
      icon512: '/assets/aiassistants/botcards/bot8card512.png'
    };
  </script>
  <audio id="bot-theme" src="/assets/aiassistants/bottheme-music.mp3" loop preload="auto"></audio>
  <canvas id="galaxyCanvas" class="galaxy-canvas"></canvas>
  <button class="back-btn" id="backBtn" onclick="goBack()" title="Back">&#9666;</button>

  <!-- Crossfade layer for state transitions -->
  <div class="bot-bg-crossfade" id="crossfadeLayer"></div>

  <!-- Voice Call Overlay -->
  <div class="voice-call-overlay" id="voiceOverlay">
    <img class="voice-call-avatar" id="voiceAvatar" src="" alt="Avatar" />
    <div class="voice-call-name" id="voiceCallName"></div>
    <div class="voice-call-status" id="voiceStatus">Listening...</div>
    <div class="voice-waveform" id="voiceWaveform">
      <div class="bar" style="animation-delay:0s;height:10px"></div>
      <div class="bar" style="animation-delay:.1s;height:15px"></div>
      <div class="bar" style="animation-delay:.2s;height:20px"></div>
      <div class="bar" style="animation-delay:.3s;height:12px"></div>
      <div class="bar" style="animation-delay:.15s;height:18px"></div>
      <div class="bar" style="animation-delay:.25s;height:8px"></div>
      <div class="bar" style="animation-delay:.35s;height:22px"></div>
      <div class="bar" style="animation-delay:.05s;height:14px"></div>
    </div>
    <button class="voice-end-btn" onclick="endVoiceCall()" title="End">&#10005;</button>
  </div>

  <div class="assistant-container" id="assistantContainer">
    <div class="chat-panel" id="chatPanel">
      <div class="chat-header">
        <div class="chat-header-left">
          <img class="chat-header-avatar" id="chatAvatar" src="" alt="Bot" />
          <div>
            <div class="chat-header-name" id="chatBotName"></div>
            <div class="chat-header-status" id="chatBotStatus">Online</div>
          </div>
        </div>
        <div class="chat-header-actions">
          <button class="chat-action-btn" id="voiceCallBtn" onclick="startVoiceCall()"
            title="Voice Call">&#9679;</button>
          <button class="pwa-install-btn" id="pwaInstallBtn" onclick="installPWA()" title="Install App">&#8595;
            Install</button>
        </div>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <div class="image-preview-row" id="imagePreviewRow"></div>
        <div class="chat-input-row">
          <button class="image-upload-btn" onclick="document.getElementById('imageInput').click()"
            title="Attach">&#9673;</button>
          <input type="file" id="imageInput" accept="image/*" multiple hidden />
          <textarea class="chat-input-field" id="chatInput" placeholder="Type your message..." rows="1"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
          <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()" title="Send">&#9654;</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var CFG = window.BOT_CONFIG;
    document.getElementById('pwaManifest').href = '/api/pwa-manifest?bot=' + CFG.id;
    document.getElementById('chatAvatar').src = CFG.cardImg;
    document.getElementById('voiceAvatar').src = CFG.cardImg;
    document.getElementById('chatBotName').textContent = CFG.name;
    document.getElementById('voiceCallName').textContent = CFG.name;
    var container = document.getElementById('assistantContainer');
    container.style.backgroundImage = "url('" + CFG.idleImg + "')";
    var preThink = new Image(); preThink.src = CFG.thinkImg;
    var preShy = new Image(); preShy.src = CFG.shyImg;

    // PWA standalone detection — hide install + back
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
      var ib = document.getElementById('pwaInstallBtn'); if (ib) ib.style.display = 'none';
      var bb = document.getElementById('backBtn'); if (bb) bb.style.display = 'none';
    }

    // Galaxy particles
    (function () {
      var c = document.getElementById('galaxyCanvas'), x = c.getContext('2d'), W, H;
      function rz() { W = c.width = innerWidth; H = c.height = innerHeight; } rz(); addEventListener('resize', rz);
      var ps = []; for (var i = 0; i < 100; i++)ps.push({ x: Math.random() * 1920, y: Math.random() * 1080, r: .2 + Math.random(), vx: (Math.random() - .5) * .12, vy: (Math.random() - .5) * .12, a: Math.random() * .2 + .02, d: 1, t: .002 + Math.random() * .003 });
      function f() { x.clearRect(0, 0, W, H); for (var p of ps) { p.a += p.d * p.t; if (p.a > .3) { p.a = .3; p.d = -1; } if (p.a < .02) { p.a = .02; p.d = 1; } p.x += p.vx; p.y += p.vy; if (p.x < -5) p.x = W + 5; if (p.x > W + 5) p.x = -5; if (p.y < -5) p.y = H + 5; if (p.y > H + 5) p.y = -5; x.beginPath(); x.fillStyle = 'rgba(255,255,255,' + p.a + ')'; x.arc(p.x, p.y, p.r, 0, Math.PI * 2); x.fill(); } requestAnimationFrame(f); } f();
    })();

    // Audio
    addEventListener('DOMContentLoaded', function () {
      var m = document.getElementById('bot-theme'); m.volume = .3;
      m.play().catch(function () { document.addEventListener('click', function r() { m.play().catch(function () { }); document.removeEventListener('click', r); }, { once: true }); });
      addBotMessage('Hello! I am ' + CFG.name + '. How can I help you?');
    });

    // ═══ CROSSFADE STATE MACHINE ═══
    var currentState = 'idle';
    var crossfadeLayer = document.getElementById('crossfadeLayer');

    function setState(s) {
      if (currentState === s) return;
      var newImg;
      if (s === 'thinking') newImg = CFG.thinkImg;
      else if (s === 'shy') newImg = CFG.shyImg;
      else newImg = CFG.idleImg;

      // Crossfade: show new image in overlay, fade in, then swap base
      crossfadeLayer.style.backgroundImage = "url('" + newImg + "')";
      crossfadeLayer.classList.add('visible');
      setTimeout(function () {
        container.style.backgroundImage = "url('" + newImg + "')";
        crossfadeLayer.classList.remove('visible');
      }, 500);

      currentState = s;
      var st = document.getElementById('chatBotStatus');
      if (s === 'thinking') st.textContent = 'Thinking...';
      else if (s === 'shy') st.textContent = 'Embarrassed...';
      else st.textContent = 'Online';
    }

    // ═══ CHAT ENGINE ═══
    var chatHistory = []; var isStreaming = false; var attachedImages = [];
    var isVoiceActive = false;

    function addUserMessage(t, imgs) {
      var d = document.createElement('div'); d.className = 'message user'; d.textContent = t;
      if (imgs && imgs.length > 0) { var iv = document.createElement('div'); iv.className = 'message-images'; imgs.forEach(function (s) { var im = document.createElement('img'); im.src = s; iv.appendChild(im); }); d.appendChild(iv); }
      document.getElementById('chatMessages').appendChild(d); scrollToBottom();
    }
    function addBotMessage(t) { var d = document.createElement('div'); d.className = 'message bot'; d.textContent = t; document.getElementById('chatMessages').appendChild(d); scrollToBottom(); }
    function createStreamingMessage() { var d = document.createElement('div'); d.className = 'message bot'; d.innerHTML = '<span class="msg-text"></span><span class="typing-cursor"></span>'; document.getElementById('chatMessages').appendChild(d); scrollToBottom(); return d; }
    function scrollToBottom() { var m = document.getElementById('chatMessages'); m.scrollTop = m.scrollHeight; }

    // ═══ ORPHEUS TTS — only in call mode OR short messages (<=10 words) ═══
    async function speakWithOrpheus(text) {
      if (!text) return;
      try {
        var res = await fetch('/api/groq-tts', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: text.slice(0, 195), voice: CFG.ttsVoice }) });
        if (!res.ok) return fallbackSpeak(text);
        var blob = await res.blob();
        var url = URL.createObjectURL(blob);
        var audio = new Audio(url); audio.volume = 0.9;
        audio.onended = function () { URL.revokeObjectURL(url); };
        audio.play().catch(function () { fallbackSpeak(text); });
      } catch (e) { fallbackSpeak(text); }
    }

    function fallbackSpeak(text) {
      if (!('speechSynthesis' in window)) return;
      speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text); u.lang = CFG.voiceLang; u.pitch = CFG.voicePitch; u.rate = CFG.voiceRate; u.volume = .9;
      var v = speechSynthesis.getVoices();
      if (v.length > 0) { var p; if (CFG.gender === 'female') p = v.find(function (x) { return x.name.toLowerCase().includes('zira') || x.name.toLowerCase().includes('samantha'); }); else p = v.find(function (x) { return x.name.toLowerCase().includes('david') || x.name.toLowerCase().includes('daniel'); }); if (p) u.voice = p; }
      speechSynthesis.speak(u);
    }

    function shouldAutoSpeak(text) {
      if (!text) return false;
      var words = text.trim().split(/\s+/).length;
      return words <= 10;
    }

    // ═══ SEND MESSAGE ═══
    async function sendMessage() {
      if (isStreaming) return;
      var input = document.getElementById('chatInput'); var text = input.value.trim();
      if (!text && attachedImages.length === 0) return;
      var imgSrcs = attachedImages.slice(); addUserMessage(text, imgSrcs);
      input.value = ''; input.style.height = 'auto'; clearImagePreviews();

      var hasImages = imgSrcs.length > 0; var msgContent;
      if (hasImages) { var parts = []; if (text) parts.push({ type: 'text', text: text }); imgSrcs.forEach(function (s) { parts.push({ type: 'image_url', image_url: { url: s } }); }); msgContent = parts; }
      else { msgContent = text; }
      chatHistory.push({ role: 'user', content: msgContent });
      isStreaming = true; setState('thinking'); document.getElementById('sendBtn').disabled = true;

      try {
        var response = await fetch('/api/groq-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: chatHistory, botName: CFG.slug, hasImages: hasImages }) });
        var ct = response.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          var data = await response.json();
          if (data.shy) { setState('shy'); addBotMessage(data.content); chatHistory.push({ role: 'assistant', content: data.content }); if (shouldAutoSpeak(data.content)) speakWithOrpheus(data.content); setTimeout(function () { setState('idle'); }, 3000); isStreaming = false; document.getElementById('sendBtn').disabled = false; return; }
          if (data.error) { addBotMessage(data.error); setState('idle'); isStreaming = false; document.getElementById('sendBtn').disabled = false; return; }
        }
        var reader = response.body.getReader(); var decoder = new TextDecoder(); var msgEl = createStreamingMessage(); var textSpan = msgEl.querySelector('.msg-text'); var fullText = ''; var buffer = '';
        while (true) {
          var result = await reader.read(); if (result.done) break; buffer += decoder.decode(result.value, { stream: true }); var lines = buffer.split('\n'); buffer = lines.pop() || '';
          for (var line of lines) { if (line.startsWith('data: ')) { var d = line.slice(6).trim(); if (d === '[DONE]') continue; try { var j = JSON.parse(d); var delta = j.choices && j.choices[0] && j.choices[0].delta && j.choices[0].delta.content; if (delta) { fullText += delta; textSpan.textContent = fullText; scrollToBottom(); } } catch (e) { } } }
        }
        var cursor = msgEl.querySelector('.typing-cursor'); if (cursor) cursor.remove();
        if (fullText) { chatHistory.push({ role: 'assistant', content: fullText }); if (shouldAutoSpeak(fullText)) speakWithOrpheus(fullText); }
      } catch (err) { addBotMessage('Connection error.'); }
      setState('idle'); isStreaming = false; document.getElementById('sendBtn').disabled = false;
    }

    // Image upload
    document.getElementById('imageInput').addEventListener('change', function (e) { var files = Array.from(e.target.files); var rem = 3 - attachedImages.length; files.slice(0, rem).forEach(function (f) { var r = new FileReader(); r.onload = function (ev) { if (attachedImages.length >= 3) return; attachedImages.push(ev.target.result); renderImagePreviews(); }; r.readAsDataURL(f); }); e.target.value = ''; });
    function renderImagePreviews() { var row = document.getElementById('imagePreviewRow'); row.innerHTML = ''; attachedImages.forEach(function (s, i) { var it = document.createElement('div'); it.className = 'image-preview-item'; it.innerHTML = '<img src="' + s + '" alt="Attached" /><button class="image-preview-remove" onclick="removeImage(' + i + ')">&#10005;</button>'; row.appendChild(it); }); }
    window.removeImage = function (i) { attachedImages.splice(i, 1); renderImagePreviews(); };
    function clearImagePreviews() { attachedImages = []; document.getElementById('imagePreviewRow').innerHTML = ''; }

    // ═══ VOICE CALL — Orpheus TTS always speaks in call mode ═══
    var recognition = null;

    function startVoiceCall() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { alert('Not supported.'); return; }
      isVoiceActive = true;
      document.getElementById('voiceOverlay').classList.add('active');
      document.getElementById('voiceCallBtn').classList.add('active');
      document.getElementById('voiceStatus').textContent = 'Listening...';
      var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SR(); recognition.continuous = true; recognition.interimResults = false; recognition.lang = 'en-US';
      recognition.onresult = async function (e) {
        var last = e.results[e.results.length - 1];
        if (last.isFinal) {
          var text = last[0].transcript.trim();
          if (text) {
            document.getElementById('voiceStatus').textContent = 'Processing...';
            addUserMessage(text, []); chatHistory.push({ role: 'user', content: text }); setState('thinking');
            try {
              var res = await fetch('/api/groq-chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: chatHistory, botName: CFG.slug, hasImages: false }) });
              var ctype = res.headers.get('content-type') || '';
              if (ctype.includes('application/json')) { var data = await res.json(); if (data.shy) { setState('shy'); addBotMessage(data.content); speakWithOrpheus(data.content); chatHistory.push({ role: 'assistant', content: data.content }); setTimeout(function () { setState('idle'); }, 3000); document.getElementById('voiceStatus').textContent = 'Listening...'; return; } }
              var reader = res.body.getReader(); var decoder = new TextDecoder(); var ft = ''; var buf = '';
              while (true) { var r = await reader.read(); if (r.done) break; buf += decoder.decode(r.value, { stream: true }); var lns = buf.split('\n'); buf = lns.pop() || ''; for (var ln of lns) { if (ln.startsWith('data: ')) { var dd = ln.slice(6).trim(); if (dd === '[DONE]') continue; try { var jj = JSON.parse(dd); var dl = jj.choices && jj.choices[0] && jj.choices[0].delta && jj.choices[0].delta.content; if (dl) ft += dl; } catch (x) { } } } }
              if (ft) { addBotMessage(ft); chatHistory.push({ role: 'assistant', content: ft }); speakWithOrpheus(ft); }
            } catch (err) { addBotMessage('Voice error.'); }
            setState('idle'); document.getElementById('voiceStatus').textContent = 'Listening...';
          }
        }
      };
      recognition.onerror = function () { document.getElementById('voiceStatus').textContent = 'Error.'; };
      recognition.onend = function () { if (isVoiceActive) try { recognition.start(); } catch (e) { } };
      recognition.start();
    }

    function endVoiceCall() {
      isVoiceActive = false; if (recognition) { recognition.abort(); recognition = null; } speechSynthesis.cancel();
      document.getElementById('voiceOverlay').classList.remove('active'); document.getElementById('voiceCallBtn').classList.remove('active');
    }

    if ('speechSynthesis' in window) { speechSynthesis.onvoiceschanged = function () { speechSynthesis.getVoices(); }; speechSynthesis.getVoices(); }

    // PWA
    var deferredPwaPrompt = null;
    addEventListener('beforeinstallprompt', function (e) { e.preventDefault(); deferredPwaPrompt = e; });
    function installPWA() { if (deferredPwaPrompt) { deferredPwaPrompt.prompt(); deferredPwaPrompt.userChoice.then(function () { deferredPwaPrompt = null; }); } else { alert('To install ' + CFG.name + ': Chrome Menu > Install app'); } }
    // After PWA installed, hide button
    addEventListener('appinstalled', function () { var b = document.getElementById('pwaInstallBtn'); if (b) b.style.display = 'none'; var bb = document.getElementById('backBtn'); if (bb) bb.style.display = 'none'; });

    function goBack() { var m = document.getElementById('bot-theme'); if (m) { m.pause(); m.currentTime = 0; } speechSynthesis.cancel(); if (recognition) { recognition.abort(); recognition = null; } location.href = '/welcome/aiassistants/choose-your-assistant'; }
    addEventListener('beforeunload', function () { var m = document.getElementById('bot-theme'); if (m) { m.pause(); m.currentTime = 0; } speechSynthesis.cancel(); });
    document.getElementById('chatInput').addEventListener('input', function () { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
  </script>
</body>

</html>
